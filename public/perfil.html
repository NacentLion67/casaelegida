<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Casa Elegida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #3D312A; --secondary: #C5A880; --bg: #FDFBF7; --border: #E6E1DA; --text-light: #8C7E74; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); min-height: 100vh; color: var(--primary); }

        .header { background: white; box-shadow: 0 2px 8px rgba(61,49,42,0.04); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--primary); }
        .back-btn { background: #F6F3EA; border: none; color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; padding: 10px 18px; border-radius: 50px; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .back-btn:hover { background: var(--primary); color: white; }

        .container { max-width: 900px; margin: 32px auto; padding: 0 20px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { padding: 12px 24px; background: white; border: 1.5px solid var(--border); font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-light); cursor: pointer; border-radius: 50px; transition: all 0.2s; }
        .tab i { margin-right: 8px; }
        .tab:hover { border-color: var(--secondary); color: var(--primary); }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .profile-card { background: white; border-radius: 28px; padding: 32px; box-shadow: 0 4px 16px rgba(61,49,42,0.04); border: 1px solid var(--border); }

        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid #F6F3EA; }
        .profile-avatar { width: 72px; height: 72px; background: linear-gradient(135deg, #3D312A, #52433A); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #C5A880; font-size: 28px; font-weight: 700; flex-shrink: 0; }
        .profile-info h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 4px; }
        .profile-info p { color: var(--text-light); font-size: 13px; }

        .seccion-titulo { font-size: 11px; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; margin-top: 24px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #F6F3EA; padding-bottom: 10px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 13px; background: var(--bg); color: var(--primary); transition: all 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(197,168,128,0.15); background: white; }
        .form-group input[readonly] { background: #F0EDE8; color: var(--text-light); cursor: not-allowed; border-color: #E6E1DA; }
        .readonly-note { font-size: 10px; color: var(--secondary); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

        .btn-save { padding: 14px 32px; background: linear-gradient(135deg, #3D312A, #52433A); color: white; border: none; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; box-shadow: 0 4px 12px rgba(61,49,42,0.2); }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(61,49,42,0.3); }

        .pedidos-list { display: flex; flex-direction: column; gap: 16px; }
        .pedido-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
        .pedido-card:hover { box-shadow: 0 4px 16px rgba(61,49,42,0.08); transform: translateY(-2px); }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .pedido-id { font-weight: 700; color: var(--primary); font-size: 14px; }
        .pedido-fecha { font-size: 12px; color: var(--text-light); }
        .estado-badge { padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; display: inline-block; }
        .estado-pendiente { background: #FCF8E3; color: #8A6D3B; }
        .estado-confirmado { background: #F6F3EA; color: #3D312A; }
        .estado-abonado { background: #D9EDF7; color: #31708F; }
        .estado-enviado { background: #E6DCD2; color: #3D312A; }
        .estado-entregado { background: #E4EDE1; color: #3C763D; }
        .estado-cancelado { background: #F2DEDE; color: #A94442; }
        .pedido-body { display: flex; gap: 20px; flex-wrap: wrap; }
        .pedido-items { flex: 2; }
        .pedido-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #F6F3EA; }
        .pedido-item:last-child { border-bottom: none; }
        .pedido-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; background: #F6F3EA; }
        .pedido-item-info h4 { font-size: 13px; margin-bottom: 2px; }
        .pedido-item-info p { font-size: 11px; color: var(--text-light); }
        .pedido-resumen { flex: 1; text-align: right; padding-top: 10px; }
        .pedido-total { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--primary); }
        .pedido-pin { margin-top: 12px; padding: 12px; background: #F0FDF4; border-radius: 12px; text-align: center; border: 1px solid #4E7A62; }
        .pedido-pin .pin-code { font-size: 28px; font-weight: 800; letter-spacing: 8px; color: #4E7A62; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(61,49,42,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-family: 'Playfair Display', serif; color: var(--primary); }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light); }
        .modal-body { padding: 24px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state i { font-size: 64px; margin-bottom: 20px; opacity: 0.3; display: block; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #3D312A; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 13px; z-index: 2000; animation: slideIn 0.3s; }
        .toast.error { background: #D96B6B; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            .pedido-body { flex-direction: column; }
            .pedido-resumen { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Casa Elegida</h1>
        </div>
        <button class="back-btn" onclick="window.location.href='/tienda'">
            <i class="fas fa-arrow-left"></i> Volver a la tienda
        </button>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('perfil')"><i class="fas fa-user"></i> Mi Perfil</button>
            <button class="tab" onclick="switchTab('pedidos')"><i class="fas fa-shopping-bag"></i> Mis Pedidos</button>
        </div>

        <div id="tab-perfil" class="tab-content active">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar" id="profile-avatar">K</div>
                    <div class="profile-info">
                        <h2 id="profile-name">Cargando...</h2>
                        <p id="profile-email"></p>
                    </div>
                </div>

                <div class="seccion-titulo"><i class="fas fa-lock"></i> Datos Personales (no editables)</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" readonly>
                        <div class="readonly-note"><i class="fas fa-lock"></i> No modificable</div>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" id="apellido" readonly>
                        <div class="readonly-note"><i class="fas fa-lock"></i> No modificable</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>DNI</label>
                        <input type="text" id="dni" readonly>
                        <div class="readonly-note"><i class="fas fa-lock"></i> No modificable</div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" readonly>
                        <div class="readonly-note"><i class="fas fa-lock"></i> No modificable</div>
                    </div>
                </div>

                <div class="seccion-titulo"><i class="fas fa-edit"></i> Datos Editables</div>
                <form id="profile-form">
                    <div class="form-group">
                        <label>Teléfono / Celular</label>
                        <input type="tel" id="telefono" placeholder="Ej: 3816123456">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Provincia</label>
                            <select id="provincia">
                                <option value="">Seleccionar</option>
                                <option>Buenos Aires</option><option>CABA</option>
                                <option>Catamarca</option><option>Chaco</option>
                                <option>Chubut</option><option>Córdoba</option>
                                <option>Corrientes</option><option>Entre Ríos</option>
                                <option>Formosa</option><option>Jujuy</option>
                                <option>La Pampa</option><option>La Rioja</option>
                                <option>Mendoza</option><option>Misiones</option>
                                <option>Neuquén</option><option>Río Negro</option>
                                <option>Salta</option><option>San Juan</option>
                                <option>San Luis</option><option>Santa Cruz</option>
                                <option>Santa Fe</option><option>Santiago del Estero</option>
                                <option>Tierra del Fuego</option><option>Tucumán</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Localidad</label>
                            <input type="text" id="localidad" placeholder="Ej: San Miguel de Tucumán">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Código Postal</label>
                            <input type="text" id="cp" placeholder="Ej: 4000">
                        </div>
                        <div class="form-group">
                            <label>Dirección</label>
                            <input type="text" id="direccion" placeholder="Calle y número">
                        </div>
                    </div>
                    <button type="submit" class="btn-save"><i class="fas fa-save"></i> Guardar Cambios</button>
                </form>
            </div>
        </div>

        <div id="tab-pedidos" class="tab-content">
            <div class="pedidos-list" id="pedidos-list">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando pedidos...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="pedido-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-pedido-id">Pedido #</h3>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-pedido-body"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
        let pedidosUsuario = [];

        function mostrarToast(msg, error = false) {
            const t = document.createElement('div');
            t.className = `toast ${error ? 'error' : ''}`;
            t.innerHTML = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        async function safeFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
            const res = await fetch(url, options);
            if (res.status === 401) { localStorage.clear(); window.location.href = '/login'; return; }
            if (!res.ok) throw new Error((await res.json().catch(()=>{})).error || 'Error');
            return res.json();
        }

        async function cargarPerfil() {
            try {
                const data = await safeFetch('/auth/me');

                document.getElementById('profile-name').textContent = `${data.nombre || ''} ${data.apellido || ''}`;
                document.getElementById('profile-email').textContent = data.email || '';
                document.getElementById('profile-avatar').textContent = (data.nombre || '?')[0].toUpperCase();

                // Campos bloqueados
                document.getElementById('nombre').value = data.nombre || '';
                document.getElementById('apellido').value = data.apellido || '';
                document.getElementById('dni').value = data.dni || '';
                document.getElementById('email').value = data.email || '';

                // Campos editables
                document.getElementById('telefono').value = data.telefono || '';
                document.getElementById('localidad').value = data.localidad || '';
                document.getElementById('cp').value = data.cp || '';
                document.getElementById('direccion').value = data.direccion || '';
                if (data.provincia) document.getElementById('provincia').value = data.provincia;

            } catch(e) { console.error(e); }
        }

        async function cargarPedidos() {
            try {
                const data = await safeFetch('/api/mis-pedidos');
                pedidosUsuario = data.lista || [];
                renderizarPedidos();
            } catch(e) { console.error(e); }
        }

        function renderizarPedidos() {
            const container = document.getElementById('pedidos-list');
            if (!pedidosUsuario.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-bag"></i><h3>No tenés pedidos aún</h3><p>¡Hacé tu primer pedido en la tienda!</p></div>`;
                return;
            }
            container.innerHTML = pedidosUsuario.map(p => {
                const estadoTexto = p.estado.charAt(0).toUpperCase() + p.estado.slice(1);
                const tienePIN = p.pin && (p.estado === 'confirmado' || p.estado === 'abonado');
                return `<div class="pedido-card" onclick="verDetallePedido('${p.id}')">
                    <div class="pedido-header">
                        <span class="pedido-id">${p.id}</span>
                        <span class="pedido-fecha">${p.fecha}</span>
                        <span class="estado-badge estado-${p.estado}">${estadoTexto}</span>
                    </div>
                    <div class="pedido-body">
                        <div class="pedido-items">
                            ${p.items.slice(0, 2).map(it => `
                                <div class="pedido-item">
                                    <img src="${it.vFoto || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22 fill=%22%23F6F3EA%22><rect width=%2250%22 height=%2250%22/></svg>'">
                                    <div class="pedido-item-info">
                                        <h4>${it.pNom}</h4>
                                        <p>${it.vNom} x ${it.cant}</p>
                                    </div>
                                </div>`).join('')}
                            ${p.items.length > 2 ? `<p style="margin-top:8px;color:var(--text-light);font-size:12px">+${p.items.length - 2} productos más</p>` : ''}
                        </div>
                        <div class="pedido-resumen">
                            <div class="pedido-total">${fmt.format(p.total)}</div>
                            <p style="font-size:12px;color:var(--text-light);margin-top:4px">${p.tipoEntrega === 'envio' ? '<i class="fas fa-truck"></i> Envío a domicilio' : '<i class="fas fa-store"></i> Retiro en local'}</p>
                        </div>
                    </div>
                    ${tienePIN ? `<div class="pedido-pin" onclick="event.stopPropagation()">
                        <p style="font-size:12px;margin-bottom:4px"><i class="fas fa-key"></i> PIN de retiro</p>
                        <div class="pin-code">${p.pin}</div>
                        <p style="font-size:11px;margin-top:4px">Presentá este código al retirar</p>
                    </div>` : ''}
                </div>`;
            }).join('');
        }

        function verDetallePedido(id) {
            const p = pedidosUsuario.find(x => x.id === id);
            if (!p) return;
            const estadoTexto = p.estado.charAt(0).toUpperCase() + p.estado.slice(1);
            const tienePIN = p.pin && (p.estado === 'confirmado' || p.estado === 'abonado');
            document.getElementById('modal-pedido-id').textContent = p.id;
            document.getElementById('modal-pedido-body').innerHTML = `
                <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;font-size:13px">
                    <p><strong>Fecha:</strong> ${p.fecha}</p>
                    <p><strong>Estado:</strong> <span class="estado-badge estado-${p.estado}">${estadoTexto}</span></p>
                    <p><strong>Entrega:</strong> ${p.tipoEntrega === 'envio' ? 'Envío a domicilio' : 'Retiro en local'}</p>
                    ${p.tipoEntrega === 'envio' && p.cliente ? `<p><strong>Dirección:</strong> ${p.cliente.direccion || ''}, ${p.cliente.localidad || ''}, ${p.cliente.provincia || ''}</p>` : ''}
                </div>
                <h4 style="margin-bottom:12px;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-light)">Productos</h4>
                ${p.items.map(it => `
                    <div class="pedido-item">
                        <img src="${it.vFoto || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22 fill=%22%23F6F3EA%22><rect width=%2250%22 height=%2250%22/></svg>'">
                        <div class="pedido-item-info">
                            <h4>${it.pNom}</h4>
                            <p>${it.vNom} x ${it.cant} | ${fmt.format(it.precio)} c/u</p>
                            <p><strong>Subtotal: ${fmt.format(it.precio * it.cant)}</strong></p>
                        </div>
                    </div>`).join('')}
                <div style="text-align:right;margin-top:20px;padding-top:16px;border-top:2px solid #F6F3EA">
                    <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--primary)">Total: ${fmt.format(p.total)}</span>
                </div>
                ${tienePIN ? `<div style="margin-top:16px;padding:16px;background:#F0FDF4;border-radius:12px;text-align:center;border:1px solid #4E7A62">
                    <p style="font-size:12px;margin-bottom:8px"><i class="fas fa-key"></i> <strong>Tu PIN de retiro</strong></p>
                    <div style="font-size:32px;font-weight:800;letter-spacing:12px;color:#4E7A62">${p.pin}</div>
                    <p style="font-size:11px;margin-top:8px;color:var(--text-light)">Presentá este código al retirar tu pedido</p>
                </div>` : ''}`;
            document.getElementById('pedido-modal').classList.add('active');
        }

        function cerrarModal() { document.getElementById('pedido-modal').classList.remove('active'); }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'perfil') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('tab-perfil').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('tab-pedidos').classList.add('active');
                cargarPedidos();
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await safeFetch('/auth/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telefono: document.getElementById('telefono').value,
                        provincia: document.getElementById('provincia').value,
                        localidad: document.getElementById('localidad').value,
                        cp: document.getElementById('cp').value,
                        direccion: document.getElementById('direccion').value
                    })
                });
                mostrarToast('✅ Datos actualizados correctamente');
                cargarPerfil();
            } catch(e) { mostrarToast('❌ Error al guardar', true); }
        });

        document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
        } else {
            cargarPerfil();
        }
    </script>
</body>
</html>
