async function cargarLogs() {
    try {
        const filtro = document.getElementById('logs-filtro')?.value || '';
        const desde = document.getElementById('logs-desde')?.value || '';
        const hasta = document.getElementById('logs-hasta')?.value || '';
        const d = await safeFetch('/logs/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filtro, desde, hasta })
        });
        const lista = d.lista || [];
        const tbody = document.getElementById('logs-body');
        if (!tbody) return;
        if (!lista.length) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px;color:#8C7E74"><i class="fas fa-history" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.3"></i>No hay registros para mostrar</td></tr>`;
            return;
        }
        const iconos = {
            LOGIN_ADMIN: {ic:'fa-sign-in-alt', col:'#4E7A62'},
            VENTA: {ic:'fa-cash-register', col:'#C5A880'},
            GUARDAR_PRODUCTO: {ic:'fa-box', col:'#3D312A'},
            ELIMINAR_PRODUCTO: {ic:'fa-trash', col:'#D96B6B'},
            GUARDAR_CONFIG: {ic:'fa-sliders-h', col:'#DE9B72'},
            PEDIDO_WEB: {ic:'fa-shopping-cart', col:'#C5A880'},
            CONFIRMAR_PEDIDO: {ic:'fa-check-circle', col:'#4E7A62'},
            CANCELAR_PEDIDO: {ic:'fa-times-circle', col:'#D96B6B'},
            PEDIDO_ABONADO: {ic:'fa-money-bill-wave', col:'#4E7A62'},
            PEDIDO_ENVIADO: {ic:'fa-truck', col:'#3D312A'},
            PEDIDO_ARMADO: {ic:'fa-box-open', col:'#C5A880'},
            BACKUP_CREADO: {ic:'fa-database', col:'#3D312A'},
            ELIMINAR_CLIENTE: {ic:'fa-user-times', col:'#D96B6B'},
            CREAR_PERFIL: {ic:'fa-user-plus', col:'#4E7A62'},
            SUBIR_LOGO: {ic:'fa-image', col:'#C5A880'},
            GUARDAR_CATEGORIA: {ic:'fa-folder', col:'#DE9B72'},
            GUARDAR_MAYORISTA: {ic:'fa-tags', col:'#C5A880'},
        };
        tbody.innerHTML = lista.map((l, index) => {
            const esImpar = index % 2 === 0;
            const bgRow = esImpar ? '#ffffff' : '#F6F3EA';
            const icono = iconos[l.accion] || {ic:'fa-circle', col:'#8C7E74'};
            const fecha = l.fechalocal || l.fechaLocal || new Date(l.fecha).toLocaleString('es-AR');
            return `<tr style="border-bottom:1px solid #E6E1DA;background:${bgRow};transition:background 0.2s" onmouseover="this.style.background='#EDE8E1'" onmouseout="this.style.background='${bgRow}'">
                <td style="padding:11px 14px;font-size:12px;color:#8C7E74;white-space:nowrap;border-right:1px solid #E6E1DA">${escapeHtml(fecha)}</td>
                <td style="padding:11px 14px;border-right:1px solid #E6E1DA">
                    <div style="display:flex;align-items:center;gap:8px">
                        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3D312A,#52433A);display:flex;align-items:center;justify-content:center;color:#C5A880;font-size:11px;flex-shrink:0;font-weight:700">${(l.admin||'?')[0].toUpperCase()}</div>
                        <span style="font-weight:600;font-size:12px;color:#3D312A">${escapeHtml(l.admin||'')}</span>
                    </div>
                </td>
                <td style="padding:11px 14px;border-right:1px solid #E6E1DA">
                    <span style="background:${icono.col}20;color:${icono.col};padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:5px;white-space:nowrap">
                        <i class="fas ${icono.ic}"></i> ${escapeHtml(l.accion||'')}
                    </span>
                </td>
                <td style="padding:11px 14px;font-size:12px;color:#8C7E74;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(l.detalles||'')}</td>
            </tr>`;
        }).join('');
    } catch(e) {}
}

                <div>
                    <label style="font-size:12px;font-weight:700;color:#3D312A;display:block;margin-bottom:6px">Monto</label>
                    <input type="number" id="gasto-monto" placeholder="0" style="width:100%;padding:12px 16px;border:1.5px solid #E6E1DA;border-radius:50px;font-size:18px;font-weight:700;text-align:center;outline:none" min="0">
                </div>
                <button onclick="confirmarGastoCaja()" style="width:100%;background:#3D312A;color:#C5A880;border:none;padding:14px;border-radius:50px;font-weight:700;cursor:pointer;font-size:14px">
                    <i class="fas fa-save"></i> Registrar Gasto
                </button>
            </div>

}

async function confirmarGastoCaja() {
    const descripcion = document.getElementById('gasto-descripcion')?.value?.trim();
    const monto = parseFloat(document.getElementById('gasto-monto')?.value) || 0;
    if (!descripcion) { mostrarToast('❌ Ingresá una descripción', true); return; }
    if (!monto) { mostrarToast('❌ Ingresá un monto', true); return; }
    try {
        await safeFetch('/admin/gasto-caja', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ descripcion, monto }) });
        document.querySelectorAll('.modal').forEach(m => m.remove());
        mostrarToast(`✅ Gasto registrado: ${fmt.format(monto)}`);
    } catch(e) { mostrarToast('❌ ' + (e.message||'Error al registrar gasto'), true); }
}

async function cargarHistorialCaja() {
    const desde = document.getElementById('caja-hist-desde')?.value || '';
    const hasta = document.getElementById('caja-hist-hasta')?.value || '';
    const container = document.getElementById('historial-caja-lista');
    if (!container) return;
    container.innerHTML = `<div style="text-align:center;padding:48px;color:#8C7E74"><i class="fas fa-spinner fa-spin" style="font-size:32px;margin-bottom:12px;color:#C5A880;display:block"></i>Cargando...</div>`;
    try {
        const d = await safeFetch('/admin/historial-caja', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({desde,hasta}) });
        _historialCaja = d.historial || [];
        if (!_historialCaja.length) {
            container.innerHTML = `<div style="text-align:center;padding:48px;color:#8C7E74;background:#fff;border-radius:20px;border:1px solid #E6E1DA"><i class="fas fa-inbox" style="font-size:40px;margin-bottom:12px;display:block;opacity:0.3"></i>No hay cierres de caja registrados</div>`;
            return;
        }
        container.innerHTML = _historialCaja.map(h => {
            const t = h.ticket;
            const todoOk = Math.abs(t.balanceEfectivo||0)<1 && Math.abs(t.balanceTransferencia||0)<1;
            return `<div style="background:#fff;border-radius:20px;border:1px solid #E6E1DA;overflow:hidden">
                <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid #F6F3EA">
                    <div style="display:flex;align-items:center;gap:14px">
                        <div style="width:44px;height:44px;border-radius:50%;background:${todoOk?'linear-gradient(135deg,#4E7A62,#3D5E4A)':'linear-gradient(135deg,#D96B6B,#B85454)'};display:flex;align-items:center;justify-content:center;color:white;font-size:16px;flex-shrink:0">
                            <i class="fas ${todoOk?'fa-check':'fa-exclamation-triangle'}"></i>
                        </div>
                        <div>
                            <div style="font-weight:700;font-size:14px;color:#3D312A">${escapeHtml(h.id)}</div>
                            <div style="font-size:12px;color:#8C7E74">${escapeHtml(h.fechaApertura||'')} → ${escapeHtml(h.fechaCierre||'')}</div>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                        <span style="font-size:12px;color:#8C7E74">Abrió: <strong>${escapeHtml(h.perfilAbre||'')}</strong> | Cerró: <strong>${escapeHtml(h.perfilCierra||'')}</strong></span>
                        <span style="background:${todoOk?'#E4EDE1':'#FFF0F0'};color:${todoOk?'#4E7A62':'#D96B6B'};font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px">${todoOk?'✅ SIN IRREGULARIDADES':'🔴 IRREGULARIDADES'}</span>
                    </div>
                </div>
                <div style="padding:10px 20px;display:flex;gap:16px;font-size:12px;color:#8C7E74;flex-wrap:wrap;border-bottom:1px solid #F6F3EA">
                    <span><i class="fas fa-money-bill-wave" style="color:#C5A880;margin-right:4px"></i>Ef: <strong>${fmt.format(t.ventasEfectivo)}</strong></span>
                    <span><i class="fas fa-exchange-alt" style="color:#C5A880;margin-right:4px"></i>Tr: <strong>${fmt.format(t.ventasTransferencia)}</strong></span>
                    <span><i class="fas fa-globe" style="color:#C5A880;margin-right:4px"></i>Web: <strong>${fmt.format(t.ventasTransferenciaWeb)}</strong></span>
                    <span><i class="fas fa-receipt" style="color:#D96B6B;margin-right:4px"></i>Gastos: <strong style="color:#D96B6B">-${fmt.format(t.totalGastos)}</strong></span>
                </div>
                <div style="padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap">
                    <button onclick="_ticketActual=_historialCaja.find(x=>x.id==='${h.id}')?.ticket;mostrarTicketCierre(_ticketActual)" style="background:#F6F3EA;color:#3D312A;border:none;padding:8px 16px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-eye"></i> Ver</button>
                    <button onclick="_ticketActual=_historialCaja.find(x=>x.id==='${h.id}')?.ticket;imprimirTicketTermico()" style="background:#3D312A;color:#C5A880;border:none;padding:8px 16px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-print"></i> Ticket Térmico</button>
                    <button onclick="_ticketActual=_historialCaja.find(x=>x.id==='${h.id}')?.ticket;imprimirTicketA4()" style="background:#C5A880;color:#3D312A;border:none;padding:8px 16px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px"><i class="fas fa-file-alt"></i> Imprimir A4</button>
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        container.innerHTML = `<div style="text-align:center;padding:48px;color:#D96B6B"><i class="fas fa-exclamation-circle"></i> Error al cargar historial</div>`;
    }
}

function procesarArchivoRestore(input) { 
    if(!input.files?.[0]) return; 
    archivoRestoreSeleccionado = input.files[0]; 
    const btn = document.getElementById('btn-restaurar'); 
    if(btn) btn.style.display = 'block'; 
    mostrarToast('📂 Copia de seguridad detectada. Presioná Ejecutar.'); 
}

async function confirmarRestauracionTotal() { 
    if(!archivoRestoreSeleccionado) return; 
    if(!confirm('🚨 ALERTA CRÍTICA: Esta acción borrará la base de datos de Railway para sobreescribirla con los datos de tu copia. ¿Deseas continuar?')) return; 
    
    const f = new FormData();
    f.append('backup', archivoRestoreSeleccionado);
    
    try {
        const btn = document.getElementById('btn-restaurar');
        if(btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Reestructurando tablas de Railway...';
        }
        
        const res = await fetch('/admin/backup/restaurar', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` },
            body: f
        });
        const d = await res.json();
        if(d.success) {
            alert('✨ ¡Base de datos restaurada con éxito! El panel se reiniciará.');
            location.reload();
        } else {
            alert('❌ Error: ' + (d.error || 'No se pudo procesar la copia.'));
            if(btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Ejecutar Restauración';
            }
        }
    } catch(e) { 
        alert('❌ Error en red al conectar con el servidor.'); 
    }
}
