<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CASA ELEGIDA | Panel de Administración</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #FDFBF7; /* Lino Claro Orgánico */
            margin: 0;
            padding: 24px;
            color: #3D312A; /* Moka Premium */
            min-height: 100vh;
            transition: all 0.3s;
        }

        body.dark-mode {
            background: #29221F; /* Moka Suave Oscuro */
            color: #FDFBF7;
        }

        .layout { display: grid; grid-template-columns: 1fr; gap: 24px; max-width: 1600px; margin: 0 auto; }
        .layout-con-carrito { display: grid; grid-template-columns: 1fr 480px; gap: 24px; }

        .panel {
            background: #ffffff;
            border-radius: 24px; /* Cambiado de 8px a 24px para mantener el estilo curvo */
            padding: 24px;
            box-shadow: 0 8px 32px rgba(61,49,42,0.03);
            border: 1px solid #E6E1DA;
            transition: all 0.3s;
        }

        body.dark-mode .panel {
            background: rgba(35, 30, 27, 0.95);
            border-color: rgba(197, 168, 128, 0.25);
        }

        .nav-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }

        .tab-btn {
            padding: 12px 28px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: white;
            transition: all 0.3s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            color: #3D312A;
        }

        body.dark-mode .tab-btn { background: #29221F; color: #FDFBF7; }

        .tab-btn.active {
            background: #3D312A; /* Moka regular de la tienda */
            color: white;
            border-bottom: 2px solid #C5A880; /* Línea oro atenuado / champagne */
            box-shadow: 0 8px 24px rgba(61,49,42,0.05);
            transform: translateY(-1px);
        }

        .tab-btn:not(.active):hover {
            background: #F6F3EA;
            color: #3D312A;
            transform: translateY(-1px);
        }

        body.dark-mode .tab-btn:not(.active):hover { background: #52433A; }

        .btn-warning { background: #DE9B72; color: white; }
        .btn-success { background: #4E7A62; color: white; }
        .btn-danger { background: #D96B6B; color: white; }
        .btn-info { background: #3D312A; color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border: 1px solid #E6E1DA;
        }

        body.dark-mode .card { background: #29221F; border-color: #3D312A; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(197, 168, 128, 0.2); }

        .producto-imagen-principal {
            width: 100%;
            height: auto;
            aspect-ratio: 4/5;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #F6F3EA;
            transition: all 0.3s;
            cursor: default;
        }

        .card h4 { font-size: 16px; font-weight: 700; margin: 8px 0; }
        .precio-producto { font-size: 22px; font-weight: 800; margin: 8px 0; color: #3D312A; }
        body.dark-mode .precio-producto { color: #C5A880; }
        .variante-item-venta.sin-stock { opacity: 0.5; pointer-events: none; }
        .variante-item-venta img { width: 100%; height: 80px; object-fit: contain; display: block; background: #F6F3EA; }
        .variante-item-venta .variante-nombre { font-size: 11px; font-weight: 600; padding: 6px 8px; color: #3D312A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        body.dark-mode .variante-item-venta .variante-nombre { color: #FDFBF7; }
        .variante-item-venta .variante-stock { font-size: 10px; color: #8C7E74; padding: 3px 6px; background: #F6F3EA; display: block; font-weight: 600; }
        .variante-item-venta.activa .variante-stock { background: #3D312A; color: white; }
        body.dark-mode .variante-item-venta.activa .variante-stock { background: #C5A880; color: #3D312A; }

        .cantidad-selector { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 12px 0; background: #F6F3EA; border-radius: 9999px; padding: 4px; width: fit-content; margin-left: auto; margin-right: auto; }
        body.dark-mode .cantidad-selector { background: #1F1A17; }
        .cantidad-btn { width: 40px; height: 40px; border-radius: 9999px; border: none; background: white; cursor: pointer; font-weight: 700; font-size: 20px; color: #3D312A; transition: all 0.2s; }
        body.dark-mode .cantidad-btn { background: #29221F; color: white; }
        .cantidad-btn:hover { background: #3D312A; color: white; transform: scale(1.1); }
        .cantidad-input { width: 60px; text-align: center; font-size: 18px; font-weight: 600; border: 2px solid #E6E1DA; background: white; border-radius: 12px; padding: 6px; }
        body.dark-mode .cantidad-input { background: #29221F; border-color: #3D312A; color: #FDFBF7; }

        .btn-add {
            width: 100%;
            background: linear-gradient(135deg, #3D312A, #52433A);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
        }

        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(61, 49, 42, 0.3); }
        .btn-add:disabled { background: #CBD5E1; cursor: not-allowed; transform: none; }

        .cart-item { background: white; border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; gap: 12px; align-items: center; border: 1px solid #E6E1DA; }
        body.dark-mode .cart-item { background: #29221F; border-color: #3D312A; }
        .cart-item.mayorista-applied { border-left: 4px solid #C5A880; background: linear-gradient(90deg, #FDFBF7 0%, #ffffff 100%); }
        .cart-img { width: 52px; height: 52px; border-radius: 20px; object-fit: cover; background: #F6F3EA; }
        .cart-info { flex: 1; } .cart-info h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; } .cart-info p { font-size: 11px; color: #8C7E74; }
        .cart-controls { display: flex; align-items: center; gap: 8px; background: #F6F3EA; padding: 4px 12px; border-radius: 40px; }
        body.dark-mode .cart-controls { background: #1F1A17; }
        .cart-controls button { border: none; background: none; cursor: pointer; font-weight: 800; font-size: 18px; width: 28px; color: #3D312A; }
        body.dark-mode .cart-controls button { color: white; }
        .cart-precio { font-weight: 700; min-width: 80px; text-align: right; }
        .btn-eliminar-cart { background: none; border: none; color: #8C7E74; cursor: pointer; font-size: 18px; } .btn-eliminar-cart:hover { color: #D96B6B; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-label { font-size: 12px; font-weight: 600; color: #3D312A; margin-bottom: 6px; display: block; }
        .required:after { content: " *"; color: #D96B6B; }

        input, select, textarea { padding: 12px 16px; border-radius: 20px; border: 1px solid #E6E1DA; width: 100%; font-family: inherit; font-size: 14px; transition: all 0.3s; background: #FDFBF7; color: #3D312A; }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #1F1A17; border-color: #3D312A; color: #FDFBF7; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #C5A880; box-shadow: 0 0 0 3px rgba(197, 168, 128, 0.15); }
        textarea { resize: vertical; min-height: 70px; }

        .total-container { background: linear-gradient(135deg, #ffffff, #FDFBF7); border-radius: 36px; padding: 24px; text-align: center; margin-top: 20px; border: 1px solid #E6E1DA; }
        body.dark-mode .total-container { background: #1F1A17; }
        .total-amount { font-size: 42px; font-weight: 800; color: #3D312A; margin: 10px 0; }
        body.dark-mode .total-amount { color: #C5A880; }

        .btn-confirm {
            background: linear-gradient(135deg, #3D312A, #52433A);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(61, 49, 42, 0.2); }
        .hidden { display: none; }
        .empty-cart { text-align: center; color: #8C7E74; padding: 48px; background: #FDFBF7; border-radius: 20px; }

        .pago-tabs, .entrega-tabs { display: flex; gap: 10px; margin: 12px 0; }
        .pago-btn, .entrega-btn { flex: 1; padding: 12px; border-radius: 40px; border: 1px solid #E6E1DA; background: white; cursor: pointer; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; color: #3D312A; }
        body.dark-mode .pago-btn, body.dark-mode .entrega-btn { background: #29221F; border-color: #3D312A; color: white; }
        .pago-btn.active, .entrega-btn.active { background: #3D312A; color: white; border-color: #3D312A; }

        .stock-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 40px; background: #F6F3EA; color: #3D312A; }
        body.dark-mode .stock-badge { background: #1F1A17; color: white; }
        .stock-bajo { background: #F6ECEB; color: #A94442; }

        .btn-print { background: #3D312A; color: white; border: none; padding: 6px 12px; border-radius: 40px; cursor: pointer; font-size: 11px; font-weight: 600; margin: 0 4px; display: inline-flex; align-items: center; gap: 6px; }
        .acciones-venta { display: flex; gap: 8px; flex-wrap: wrap; }

        .producto-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #E6E1DA; }
        body.dark-mode .producto-card { background: #29221F; border-color: #3D312A; }
        .producto-header { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
        .producto-imagen { flex-shrink: 0; } .producto-imagen img { width: 100%; height: 100px; object-fit: cover; border-radius: 20px; background: #F6F3EA; border: 1px solid #E6E1DA; }
        .producto-info { flex: 1; min-width: 200px; }
        .drag-handle { cursor: grab; color: #C5A880; font-size: 24px; padding: 0 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(61, 49, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 28px; padding: 28px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(61, 49, 42, 0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #E6E1DA; }
        .modal-header h3 { font-size: 20px; font-weight: 700; color: #3D312A; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #8C7E74; }
        .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }

        .config-section { background: white; border-radius: 28px; padding: 32px; margin-bottom: 0; border: 1px solid #E6E1DA; width:100%; }
body.dark-mode .config-section { background: #29221F; border-color: #3D312A; }
.config-section h3 { color: #3D312A; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
body.dark-mode .config-section h3 { color: #C5A880; }

        .logo-preview { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px; background: #FDFBF7; border-radius: 20px; margin-bottom: 20px; }
        .logo-preview img { max-width: 200px; max-height: 80px; object-fit: contain; border-radius: 12px; border: 1px solid #E6E1DA; padding: 8px; background: white; }
        .logo-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .modo-option { flex: 1; padding: 16px; border-radius: 16px; background: #FDFBF7; border: 2px solid #E6E1DA; text-align: center; cursor: pointer; transition: all 0.3s; }
        .modo-option.active { border-color: #3D312A; background: #F6F3EA; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 24px; padding: 20px; text-align: center; border: 1px solid #E6E1DA; }
        body.dark-mode .stat-card { background: #29221F; border-color: #3D312A; }
        .stat-card i { font-size: 32px; margin-bottom: 8px; } .stat-card h3 { font-size: 28px; font-weight: 800; margin: 8px 0; color: #3D312A; }
        body.dark-mode .stat-card h3 { color: #C5A880; }

        .toast-notification { position: fixed; bottom: 24px; right: 24px; background: #3D312A; color: white; padding: 12px 24px; border-radius: 40px; font-weight: 600; z-index: 1002; animation: slideIn 0.3s ease-out; }
        .toast-notification.error { background: #D96B6B; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .ventas-buscador { margin-bottom: 16px; } .ventas-buscador input { padding: 12px; border-radius: 20px; border: 1px solid #E6E1DA; width: 100%; }
        .btn-excel { background: #3D312A; color: white; }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: #D96B6B; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .notif-panel { position: absolute; top: 50px; right: 0; width: 350px; max-height: 450px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15); overflow: hidden; z-index: 100; }
        .notif-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #E6E1DA; }
        .notif-list { max-height: 380px; overflow-y: auto; }
        .notif-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #E6E1DA; cursor: pointer; }
        .notif-item.no-leida { background: #FDFBF7; }
        .notif-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .notif-icon.pedido { background: #F6F3EA; color: #3D312A; } .notif-icon.stock { background: #F6ECEB; color: #D96B6B; } .notif-icon.venta { background: #C5A880; color: white; }
        .notif-content { flex: 1; } .notif-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; } .notif-desc { font-size: 11px; color: #8C7E74; } .notif-time { font-size: 10px; color: #8C7E74; margin-top: 4px; }

        .estado-badge { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; display: inline-block; }
        .estado-pendiente { background: #FCF8E3; color: #8A6D3B; } .estado-confirmado { background: #F6F3EA; color: #3D312A; } .estado-abonado { background: #D9EDF7; color: #31708F; } .estado-enviado { background: #E6DCD2; color: #3D312A; } .estado-entreg { background: #E4EDE1; color: #3C763D; } .estado-cancelado { background: #F2DEDE; color: #A94442; }

        .perfil-card { background: #FDFBF7; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #E6E1DA; display: flex; justify-content: space-between; align-items: center; }
        .perfil-card h5 { font-size: 14px; margin-bottom: 4px; } .perfil-card p { font-size: 11px; color: #8C7E74; }
        .variantes-panel { background: #FDFBF7; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .variante-item { background: white; border-radius: 16px; padding: 16px; border: 1px solid #E6E1DA; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn-toggle-variantes { margin-top: 12px; padding: 10px 20px; background: #3D312A; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-toggle-variantes:hover { background: #52433A; }

        .variantes-grid-container { background: #F6F3EA; border-radius: 14px; max-height: 0; overflow: hidden; opacity: 0; padding: 0 12px; margin: 0; transition: max-height 0.3s cubic-bezier(0.25,1,0.5,1), opacity 0.2s ease, padding 0.3s cubic-bezier(0.25,1,0.5,1), margin 0.3s cubic-bezier(0.25,1,0.5,1); }
        .variantes-grid-container.desplegado { max-height: 280px; overflow-y: auto; opacity: 1; padding: 12px; margin: 10px 0; }
        .variantes-grid-container::-webkit-scrollbar { width: 4px; }
        .variantes-grid-container::-webkit-scrollbar-thumb { background: #C5A880; border-radius: 2px; }
        .btn-desplegar-variantes { width: 100%; padding: 10px; background: #F6F3EA; color: #3D312A; border: 1px solid #E6E1DA; border-radius: 12px; font-weight: 600; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin: 8px 0; transition: all 0.2s; }
        .btn-desplegar-variantes:hover { background: #E6E1DA; }
        .btn-desplegar-variantes.activo { background: #3D312A; color: white; }

        .theme-config { position: fixed; bottom: 20px; left: 20px; z-index: 999; }
        .theme-config-btn { width: 50px; height: 50px; border-radius: 50%; background: #3D312A; color: white; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 4px 20px rgba(61, 49, 42, 0.3); transition: all 0.3s; }
        .theme-config-btn:hover { transform: scale(1.1); }
        .theme-panel { position: absolute; bottom: 60px; left: 0; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15); width: 300px; display: none; }
        .theme-panel.active { display: block; }

        .backup-hero { background: linear-gradient(135deg, #3D312A 0%, #52433A 100%); color: white; border-radius: 24px; padding: 32px; text-align: center; margin-bottom: 24px; }
        .backup-hero-icon { font-size: 64px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .btn-backup-master { padding: 18px 40px; background: linear-gradient(135deg, #C5A880, #E6E1DA); color: #3D312A; border: none; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; transition: all 0.3s; }
        .btn-backup-master:hover { transform: translateY(-3px); }
        .btn-backup-master:disabled { background: #8C7E74; cursor: not-allowed; }
        .backup-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .backup-card-item { background: white; border-radius: 20px; padding: 28px; border: 2px solid #E6E1DA; transition: all 0.3s; cursor: pointer; }
        body.dark-mode .backup-card-item { background: #29221F; border-color: #3D312A; }
        .backup-card-item:hover { border-color: #C5A880; }
        .backup-card-icon { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 16px; }
        .restore-zone { border: 2px dashed #C5A880; border-radius: 16px; padding: 40px; cursor: pointer; transition: all 0.3s; background: white; margin-bottom: 16px; }
        .restore-zone:hover, .restore-zone.dragover { border-color: #3D312A; background: #FDFBF7; }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th { background: #F6F3EA; padding: 12px; text-align: left; font-size: 12px; font-weight: 600; color: #3D312A; }
        .history-table td { padding: 12px; border-bottom: 1px solid #E6E1DA; font-size: 13px; }

        /* ==========================================================================
           ESTILOS PREMIUM HIGH-PRESTIGE (CURVAS & ELEGANCIA)
           ========================================================================== */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #FDFBF7; /* Fondo lino orgánico premium */
            background-image: radial-gradient(var(--secondary) 0.75px, transparent 0);
            background-size: 24px 24px;
            opacity: 0.98;
            padding: 24px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); /* Efecto cristal de lujo */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px; /* Super redondeado de prestigio */
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(61, 49, 42, 0.08), 
                        0 8px 24px rgba(197, 168, 128, 0.04);
            text-align: center;
            animation: loginFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .login-logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 24px;
            background: #ffffff;
            border-radius: 50%; /* Contenedor de logo circular perfecto */
            box-shadow: 0 12px 32px rgba(61, 49, 42, 0.05);
            border: 1px solid rgba(197, 168, 128, 0.2);

<script>
let adminToken = localStorage.getItem('adminToken');
let adminActual = null;
let productos = [], carrito = [], metodoPago = 'efectivo', logistica = 'local', totalVenta = 0;
let ventasHistorial = [], pedidosTienda = [], categorias = [], metodosEnvio = [];
let todosClientes = [], productosRendimiento = [], costosProductos = {}; // ÚNICA DECLARACIÓN GLOBAL LIMPIA
let varianteSeleccionada = {}, configuracion = {}, mayoristaHabilitado = false, mayoristaModo = 'cantidad';
let notificaciones = [], notificacionesNoLeidas = 0;
let chartsInstances = {};
let archivoRestoreSeleccionado = null;
let cajaActual = null;
let _ticketActual = null;
let _historialCaja = [];
let variantRowCounter = {};
let guardandoProductos = new Set();
const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });

function mostrarToast(msg, error=false) { const t = document.createElement('div'); t.className = `toast-notification ${error?'error':''}`; t.innerHTML = `<i class="fas ${error?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function formatearNumero(n) { if(!n) return '0'; return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function desformatearNumero(t) { if(!t) return 0; return parseInt(t.toString().replace(/\./g,''))||0; }
function sanitizarUrl(url){ if(!url || url === '') return ''; if(url.startsWith('/uploads/') || url.startsWith('http://') || url.startsWith('https://')) return url; return url; }

async function safeFetch(url, options={}) { 
    if (adminToken) options.headers = { ...options.headers, 'Authorization': `Bearer ${adminToken}` }; 
    try { 
        const res = await fetch(url, options);
        if (res.status === 401) {
            localStorage.removeItem('adminToken');
            mostrarToast('⏰ Sesión expirada, volvé a ingresar', true);
            setTimeout(() => location.reload(), 2000);
            throw new Error('Sesión expirada');
        }
        if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || `HTTP ${res.status}`); 
        return await res.json(); 
    } catch(e) { mostrarToast(e.message, true); throw e; } 
}

async function cargarClientes() {
    try {
        const d = await safeFetch('/admin/listar-clientes', { method: 'POST' });
        todosClientes = d.lista || [];
        renderizarClientes(todosClientes);
    } catch(e) {}
}

function renderizarClientes(lista) {
    const badge = document.getElementById('clientes-total-badge');
    if (badge) badge.innerHTML = `<i class="fas fa-users"></i> ${lista.length} clientes`;

    const stats = document.getElementById('clientes-stats');
    if (stats) {
        const conDatos = lista.filter(c => c.dni && c.dni.trim() !== '').length;
        const conTel = lista.filter(c => c.telefono && c.telefono.trim() !== '').length;
        stats.innerHTML = `
            <div class="stat-card" style="border-left:4px solid #C5A880"><i class="fas fa-users" style="color:#C5A880;font-size:26px;margin-bottom:8px"></i><h3>${lista.length}</h3><p style="color:#8C7E74;font-size:12px">Total clientes</p></div>
            <div class="stat-card" style="border-left:4px solid #4E7A62"><i class="fas fa-id-card" style="color:#4E7A62;font-size:26px;margin-bottom:8px"></i><h3>${conDatos}</h3><p style="color:#8C7E74;font-size:12px">Con DNI cargado</p></div>
            <div class="stat-card" style="border-left:4px solid #3D312A"><i class="fas fa-phone" style="color:#3D312A;font-size:26px;margin-bottom:8px"></i><h3>${conTel}</h3><p style="color:#8C7E74;font-size:12px">Con teléfono</p></div>
        `;
    }

    const grid = document.getElementById('clientes-grid');
    if (!grid) return;

    if (!lista.length) {
        grid.innerHTML = `<div style="text-align:center;padding:48px;color:#8C7E74"><i class="fas fa-users" style="font-size:40px;margin-bottom:12px;display:block;opacity:0.3"></i>No se encontraron clientes</div>`;
        return;
    }

    grid.innerHTML = lista.map(c => `
        <div style="background:#fff;border-radius:20px;border:1px solid #E6E1DA;overflow:hidden;transition:all 0.3s" onmouseover="this.style.boxShadow='0 4px 16px rgba(61,49,42,0.08)'" onmouseout="this.style.boxShadow=''">
            <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
                <div style="display:flex;align-items:center;gap:14px">
                    <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#3D312A,#52433A);display:flex;align-items:center;justify-content:center;color:#C5A880;font-size:18px;font-weight:700;flex-shrink:0">
                        ${(c.nombre||'?')[0].toUpperCase()}
                    </div>
                    <div>
                        <div style="font-weight:700;font-size:15px;color:#3D312A">${escapeHtml(c.nombre||'')} ${escapeHtml(c.apellido||'')}</div>
                        <div style="font-size:12px;color:#8C7E74;margin-top:2px">${escapeHtml(c.email||'')}</div>
                    </div>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                    <button onclick="verHistorialClienteCompleto('${c.id}','${escapeHtml(c.nombre||'')} ${escapeHtml(c.apellido||'')}')" style="background:#3D312A;color:white;border:none;padding:8px 16px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px">

function toggleDatosCliente(id) {
    const el = document.getElementById(id);

}

function filtrarClientes() {
    const busq = (document.getElementById('clientes-buscador')?.value || '').toLowerCase();
    const lista = busq ? todosClientes.filter(c =>
        (c.nombre||'').toLowerCase().includes(busq) ||
        (c.apellido||'').toLowerCase().includes(busq) ||
        (c.dni||'').toLowerCase().includes(busq) ||
        (c.email||'').toLowerCase().includes(busq) ||
        (c.telefono||'').toLowerCase().includes(busq)
    ) : todosClientes;
    renderizarClientes(lista);
}

async function eliminarCliente(id, nombre) {
    if (!confirm(`¿Eliminar al cliente ${nombre}? Esta acción no se puede deshacer.`)) return;
    const pwd = prompt('Ingresá tu contraseña de admin para confirmar:');
    if (!pwd) return;
    try {
        await safeFetch('/admin/eliminar-cliente', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: id, adminPassword: pwd })
        });
        mostrarToast('✅ Cliente eliminado');
        cargarClientes();
    } catch(e) {}
}

    try { 
        const res = await fetch('/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario,password}) }); 
        const data = await res.json(); 
        if (data.success) { 
            localStorage.setItem('adminToken', data.token); 
            adminToken = data.token; 
            adminActual = data.perfil;

            tab('v');

}

async function cargarConfiguracion() {
    try {
        const d = await safeFetch('/get-config', { method: 'POST' });
        if (!d) return;

        const c = d.configuracion || d.config || d;
        configuracion = c;
        window.configuracion = c;
        
        const img = document.getElementById('logo-preview-img');
        const placeholder = document.getElementById('logo-placeholder');
        if (c.logo && c.logo.trim() !== '') {
            if (img) { img.src = c.logo; img.style.display = 'block'; }
            if (placeholder) placeholder.style.display = 'none';
        } else {
            if (img) img.style.display = 'none';
            if (placeholder) placeholder.style.display = 'block';
        }
        
        const deserializarSeguro = (campo) => {
            if (!campo) return {};
            if (typeof campo === 'object') return campo;
            try { return JSON.parse(campo); } catch(e) { return {}; }
        };

        const emp = deserializarSeguro(c.empresa);
        if (document.getElementById('empresa-nombre')) document.getElementById('empresa-nombre').value = emp.nombre || '';
        if (document.getElementById('empresa-slogan')) document.getElementById('empresa-slogan').value = emp.slogan || '';
        if (document.getElementById('empresa-telefono')) document.getElementById('empresa-telefono').value = emp.telefono || '';
        if (document.getElementById('empresa-email')) document.getElementById('empresa-email').value = emp.email || '';
        if (document.getElementById('empresa-direccion')) document.getElementById('empresa-direccion').value = emp.direccion || '';
        
        const hor = deserializarSeguro(c.horarios);
        if (document.getElementById('horario-lv')) document.getElementById('horario-lv').value = hor.lunesViernes || '';
        if (document.getElementById('horario-sab')) document.getElementById('horario-sab').value = hor.sabados || '';
        if (document.getElementById('horario-dom')) document.getElementById('horario-dom').value = hor.domingos || '';
        
        const red = deserializarSeguro(c.redes);
        if (document.getElementById('red-instagram')) document.getElementById('red-instagram').value = red.instagram || '';
        if (document.getElementById('red-facebook')) document.getElementById('red-facebook').value = red.facebook || '';
        if (document.getElementById('red-tiktok')) document.getElementById('red-tiktok').value = red.tiktok || '';
        if (document.getElementById('red-whatsapp')) document.getElementById('red-whatsapp').value = red.whatsapp || '';
        
        const pag = deserializarSeguro(c.pagos);
        if (document.getElementById('pago-alias')) document.getElementById('pago-alias').value = pag.alias || '';
        if (document.getElementById('pago-cbu')) document.getElementById('pago-cbu').value = pag.cbu || '';
        if (document.getElementById('pago-banco')) document.getElementById('pago-banco').value = pag.banco || '';
        if (document.getElementById('pago-titular')) document.getElementById('pago-titular').value = pag.titular || '';
        
        const dis = deserializarSeguro(c.diseno);
        if (document.getElementById('tienda-color-primary')) document.getElementById('tienda-color-primary').value = dis.colorPrimario || '#3D312A';
        if (document.getElementById('tienda-color-secondary')) document.getElementById('tienda-color-secondary').value = dis.colorSecundario || '#C5A880';
        if (document.getElementById('tienda-color-bg')) document.getElementById('tienda-color-bg').value = dis.colorFondo || '#FDFBF7';
        if (document.getElementById('tienda-color-text')) document.getElementById('tienda-color-text').value = dis.colorTexto || '#3D312A';
        
        const tnd = deserializarSeguro(c.tienda);
        if (document.getElementById('tienda-titulo')) document.getElementById('tienda-titulo').value = tnd.titulo || '';
        if (document.getElementById('tienda-mensaje')) document.getElementById('tienda-mensaje').value = tnd.mensajeBienvenida || '';
        setTiendaHabilitada(tnd.habilitada !== false);
        
        const may = deserializarSeguro(c.mayorista);
        mayoristaHabilitado = may.habilitado || false;
        mayoristaModo = may.modo || 'cantidad';
        if (document.getElementById('mayoristaCantidad')) document.getElementById('mayoristaCantidad').value = may.valorCantidad || 3;
        if (document.getElementById('mayoristaMonto')) document.getElementById('mayoristaMonto').value = formatearNumero(may.valorMonto || 80000);
        
        if (document.querySelectorAll('.modo-option').length) {
            selectMayoristaModo(mayoristaModo);
        }
        
        const pnl = document.getElementById('mayoristaPanel');
        const btn = document.getElementById('btnMayoristaToggle');
        if (!mayoristaHabilitado) {
            if (pnl) pnl.style.display = 'none';
            if (btn) { btn.innerHTML = '<i class="fas fa-toggle-off"></i> Desactivado'; btn.style.background = '#64748b'; }
        } else {
            if (pnl) pnl.style.display = 'block';
            if (btn) { btn.innerHTML = '<i class="fas fa-toggle-on"></i> Activado'; btn.style.background = '#10b981'; }
        }
        
    } catch (e) {
        console.error('❌ Error en cargarConfiguracion:', e);
    }
}

async function guardarGastoVentas() {
    const nombre = document.getElementById('gasto-nombre').value.trim();
    const monto = parseFloat(document.getElementById('gasto-monto').value) || 0;
    const tipo = document.querySelector('input[name="gasto-tipo"]:checked').value;
    if(!nombre || monto <= 0) { alert('Por favor complete el nombre y monto correctamente.'); return; }
    try {
        const respuesta = await safeFetch('/admin/agregar-gasto', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo, nombre, monto })
        });
        if (respuesta && respuesta.success === false) { mostrarToast(respuesta.error, true); return; }
        if (respuesta && respuesta.success) {
            mostrarToast('💸 Gasto guardado con éxito');
            const modal = document.getElementById('modal-gasto-container');
            if (modal) modal.remove();
        }
    } catch(e) { mostrarToast('Error de conexión al guardar el gasto', true); }
}

}

function toggleVariantesVenta(id){ const c=document.getElementById(`variantes-container-${id}`); const b=document.getElementById(`btn-desplegar-${id}`); const t=document.getElementById(`btn-texto-${id}`); const ic=document.getElementById(`btn-icono-${id}`); if(!c||!b)return; if(c.classList.contains('desplegado')){c.classList.remove('desplegado');b.classList.remove('activo');t.textContent=`Desplegar variantes (${productos.find(p=>p.id==id)?.variantes.length||0})`;ic.className='fas fa-chevron-down';}else{c.classList.add('desplegado');b.classList.add('activo');t.textContent='Ocultar variantes';ic.className='fas fa-chevron-up';setTimeout(()=>{const a=c.querySelector('.variante-item-venta.activa');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest'});},100);} }

function seleccionarVarianteVisual(id, idx){
    const p = productos.find(x => x.id == id); if (!p) return;
    const v = p.variantes[idx];
    if (v.stock === 0) { mostrarToast('⚠️ Sin stock', true); return; }
    varianteSeleccionada[id] = idx;

    document.querySelectorAll(`#variantes-container-${id} .variante-item-venta`).forEach(el => {
        const i = parseInt(el.getAttribute('data-index'));
        const esActiva = i === idx;
        const sinStock = p.variantes[i]?.stock === 0;
        el.classList.toggle('activa', esActiva);
        el.classList.toggle('sin-stock', sinStock);
        el.style.border = esActiva ? '2px solid #3D312A' : '2px solid #E6E1DA';
        el.style.background = esActiva ? '#F6F3EA' : 'white';
        el.style.boxShadow = esActiva ? '0 2px 8px rgba(61,49,42,0.12)' : 'none';
        const nombreEl = el.querySelector('.variante-nombre');
        if (nombreEl) {
            const nombreBase = p.variantes[i]?.nombre || '';
            nombreEl.textContent = esActiva ? nombreBase + ' ✓' : nombreBase;
            nombreEl.style.fontWeight = esActiva ? '800' : '600';
            nombreEl.style.color = esActiva ? '#3D312A' : '#8C7E74';
        }
    });

    const img = document.getElementById(`img-principal-${id}`);
    if (img) { img.style.opacity = '0.4'; setTimeout(() => { img.src = sanitizarUrl(v.foto); img.style.opacity = '1'; }, 150); }
    const inp = document.getElementById(`q-${id}`);
    if (inp) { inp.max = v.stock; if (parseInt(inp.value) > v.stock) inp.value = v.stock; }
    const badge = document.getElementById(`stock-badge-${id}`);
    if (badge) { badge.innerHTML = `<i class="fas fa-box"></i> Stock: ${v.stock}`; badge.className = `stock-badge ${v.stock <= 5 ? 'stock-bajo' : ''}`; }
    const btn = document.getElementById(`btn-add-${id}`);
    if (btn) { btn.disabled = v.stock === 0; btn.innerHTML = v.stock === 0 ? '<i class="fas fa-cart-plus"></i> Sin Stock' : '<i class="fas fa-cart-plus"></i> Agregar al Pedido'; }
}
    
function validarCantidad(id){ const i=document.getElementById(`q-${id}`); if(!i)return; const m=parseInt(i.max)||999; const v=parseInt(i.value)||1; if(v>m)i.value=m; if(v<1)i.value=1; }
function cambiarCantidad(id,d){ const i=document.getElementById('q-'+id); if(i){let n=(parseInt(i.value)||1)+d;n=Math.max(1,Math.min(n,parseInt(i.max)||999));i.value=n;} }

async function addAlCarrito(id){ let p=productos.find(x=>x.id==id); if(!p)return; let idx=varianteSeleccionada[id]||0; let v=p.variantes[idx]; if(!v)return; let c=parseInt(document.getElementById('q-'+id).value); try{const res=await fetch('/verificar-stock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productoId:id,varianteNombre:v.nombre})});const data=await res.json();if(data.stock!==undefined){v.stock=data.stock;seleccionarVarianteVisual(id,idx);}}catch(e){} if(v.stock<c){mostrarToast('❌ Stock insuficiente. Disponible: '+v.stock,true);return;} let e=carrito.find(i=>i.pId===id&&i.vNom===v.nombre&&!i.esManual); if(e){if(v.stock<e.cant+c){mostrarToast('❌ Stock insuficiente',true);return;}e.cant+=c;}else{carrito.push({pId:id,pNom:p.nombre,vNom:v.nombre,vFoto:v.foto||'',precio:p.precio,precioMayor:p.precioMayor||0,cant:c,esManual:false});} calcularPreciosMayoristaEnVivo(); renderCart(); localStorage.setItem('pos_carrito',JSON.stringify(carrito)); mostrarToast('✅ Agregado'); }

function calcularPreciosMayoristaEnVivo(){
    let confMayorista = configuracion.mayorista; 
    if (typeof confMayorista === 'string') { try { confMayorista = JSON.parse(confMayorista); } catch(e) { confMayorista = {}; } }
    if(!confMayorista || !confMayorista.habilitado){ 
        carrito.forEach(i=>{ if(i.precioOriginal){ i.precio=i.precioOriginal; delete i.precioOriginal; } }); 
        renderCart(); 
        return; 
    }
    const modo = confMayorista.modo || 'cantidad', valorCantidad = parseInt(confMayorista.valorCantidad) || 3, valorMonto = parseFloat(confMayorista.valorMonto) || 80000;
    const cT = carrito.reduce((s,i)=>s+i.cant,0); 
    const montoTotalMayorista = carrito.reduce((s,i)=>{ 
        const p=productos.find(x=>x.id==i.pId); 
        const precioAUsar = (p && p.precioMayor > 0) ? p.precioMayor : (i.precioOriginal || i.precio); 
        return s + (precioAUsar * i.cant); 
    },0);
    let cumple = false; 
    if (modo === 'cantidad') cumple = cT >= valorCantidad; 
    else if (modo === 'monto') cumple = montoTotalMayorista >= valorMonto; 
    else if (modo === 'ambas') cumple = (cT >= valorCantidad && montoTotalMayorista >= valorMonto);
    carrito.forEach(i=>{ 
        if(i.esManual)return; 
        const p=productos.find(x=>x.id==i.pId); 
        if(!p||!p.precioMayor)return; 
        if(cumple){ 
            if(!i.precioOriginal) i.precioOriginal=i.precio; 
            i.precio=p.precioMayor; 
        }else if(i.precioOriginal){ 
            i.precio=i.precioOriginal; 
            delete i.precioOriginal; 
        } 
    }); 
    renderCart();
}

function renderCart(){
    let d=document.getElementById('cart-items'); if(!d)return; totalVenta=0; d.innerHTML='';
    if(!carrito.length) d.innerHTML='<div class="empty-cart"><i class="fas fa-shopping-cart"></i><br>Vacío</div>';
    else carrito.forEach((it,i)=>{ 
        totalVenta+=it.precio*it.cant; 
        d.innerHTML+=`<div class="cart-item ${it.precioOriginal&&it.precio<it.precioOriginal?'mayorista-applied':''}"><img src="${sanitizarUrl(it.vFoto)}" class="cart-img"><div class="cart-info"><h4>${escapeHtml(it.pNom)} ${it.precioOriginal&&it.precio<it.precioOriginal?'<span style="background:#10b981;color:white;padding:2px 6px;border-radius:10px;font-size:9px;margin-left:4px">MAY</span>':''}</h4><p>${escapeHtml(it.vNom)} • ${fmt.format(it.precio)} c/u</p></div><div class="cart-controls"><button type="button" onclick="modificarCantidadCarrito(${i},-1)">-</button><span>${it.cant}</span><button type="button" onclick="modificarCantidadCarrito(${i},1)">+</button></div><div class="cart-precio"><strong>${fmt.format(it.precio*it.cant)}</strong></div><button type="button" class="btn-eliminar-cart" onclick="eliminarDelCarrito(${i})"><i class="fas fa-trash-alt"></i></button></div>`; 
    });
    document.getElementById('total-txt').innerHTML=fmt.format(totalVenta); 
    const floatBadge = document.getElementById('cart-float-badge'); 
    if (floatBadge) floatBadge.textContent = carrito.reduce((acc, item) => acc + item.cant, 0);
}

function modificarCantidadCarrito(i,d){ if(!carrito[i])return; let nc=carrito[i].cant+d; if(nc<1){eliminarDelCarrito(i);return;} carrito[i].cant=nc; calcularPreciosMayoristaEnVivo(); renderCart(); localStorage.setItem('pos_carrito',JSON.stringify(carrito)); }
function eliminarDelCarrito(i){ carrito.splice(i,1); calcularPreciosMayoristaEnVivo(); renderCart(); localStorage.setItem('pos_carrito',JSON.stringify(carrito)); }

function setMetodo(m) {
    metodoPago = m;
    document.querySelectorAll('.pago-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(m==='efectivo'?'p-ef':m==='transferencia'?'p-tr':'p-mx').classList.add('active');
    const formMixto = document.getElementById('form-mixto');
    if (formMixto) {
        formMixto.style.display = m === 'mixto' ? 'block' : 'none';
        if (m === 'mixto') {
            document.getElementById('mixto-efectivo').value = '';
            document.getElementById('mixto-transferencia').value = '';
            calcularMixto('efectivo');
        }
    }
}

function calcularMixto(origen) {
    const total = totalVenta;
    const efInp = document.getElementById('mixto-efectivo');
    const trInp = document.getElementById('mixto-transferencia');
    const resumen = document.getElementById('mixto-resumen');
    if (!efInp || !trInp) return;
    if (origen === 'efectivo') {
        const ef = parseFloat(efInp.value) || 0;
        const tr = Math.max(0, total - ef);
        trInp.value = tr > 0 ? tr : '';
    } else {
        const tr = parseFloat(trInp.value) || 0;
        const ef = Math.max(0, total - tr);
        efInp.value = ef > 0 ? ef : '';
    }
    const ef = parseFloat(efInp.value) || 0;
    const tr = parseFloat(trInp.value) || 0;
    const suma = ef + tr;
    const diff = suma - total;
    if (resumen) {
        if (diff === 0) resumen.innerHTML = `<i class="fas fa-check-circle" style="color:#4E7A62"></i> Cuadra perfecto — ${fmt.format(total)}`;
        else if (diff > 0) resumen.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#D96B6B"></i> Excede por ${fmt.format(diff)}`;
        else resumen.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#DE9B72"></i> Falta ${fmt.format(Math.abs(diff))}`;
    }
}
    
async function checkout(){
    if(!carrito.length){mostrarToast('Carrito vacío',true);return;}
    try { const caja = await safeFetch('/admin/estado-caja', {method:'POST'}); if (!caja.abierta) { mostrarToast('🔒 Debes abrir la caja antes de realizar ventas', true); return; } } catch(e) {}
    let cd={nombre:'Mostrador'}; if(logistica==='envio'){ let n=document.getElementById('env-nombre').value.trim(), dni=document.getElementById('env-dni').value.trim(), c=document.getElementById('env-celular').value.trim(); if(!n||!dni||!c){mostrarToast('Completá datos',true);return;} cd={nombre:n,dni:dni,celular:c}; }
    let pagoData = { total: totalVenta, metodo: metodoPago };
    if (metodoPago === 'mixto') {
        const ef = parseFloat(document.getElementById('mixto-efectivo')?.value) || 0;
        const tr = parseFloat(document.getElementById('mixto-transferencia')?.value) || 0;
        if (ef + tr !== totalVenta) { mostrarToast('❌ El mixto no cuadra con el total', true); return; }
        pagoData.efectivo = ef;
        pagoData.transferencia = tr;
    }
    let data=await safeFetch('/confirmar-venta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({carrito,pago:pagoData,logistica,cliente:cd,mayoristaConfig:{habilitado:mayoristaHabilitado}})});
    if(data.success){mostrarToast(`✅ Venta ${data.ventaId}`);carrito=[];renderCart();localStorage.removeItem('pos_carrito');cargar();cargarVentas();}
}

async function subirFotoVarianteNativa(input, pid, idx) {
    if(!input.files?.[0]) return; const f = new FormData(); f.append('foto', input.files[0]);
    try {
        const d = await safeFetch('/subir-imagen', { method: 'POST', body: f });
        if(d.url) {
            const row = input.closest('.row-variante-accion');
            if(row) {
                row.querySelector('.v-input-foto').value = d.url; const img = row.querySelector('img'); const icon = row.querySelector('span');
                if(img) { img.src = d.url; img.style.display = 'block'; } if(icon) { icon.style.display = 'none'; }
            }
            mostrarToast('✅ Subida con éxito');
        }
    } catch(e) { mostrarToast('❌ Error al subir la imagen', true); }
}

function aplicarStockGlobal(pid){ const s=parseInt(document.getElementById('stock-global').value)||0; document.querySelectorAll(`#contenedor-filas-variantes-${pid} .v-input-stock`).forEach(inp => inp.value = s); document.querySelector('.modal.active')?.remove(); mostrarToast(`✅ Stock ${s} asignado temporalmente`); }
function actualizarSubcategorias(pid){ const catId=document.getElementById(`cat-${pid}`).value; const cat=categorias.find(c=>c.id==parseInt(catId)); const sel=document.getElementById(`subcat-${pid}`); if(!sel)return; let h='<option value="">Sin subcategoría</option>'; if(cat?.subcategorias?.length)h+=cat.subcategorias.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join(''); sel.innerHTML=h; }

async function saveEdit(id){
    if (guardandoProductos.has(id)) { mostrarToast('⏳ Ya se está guardando este producto...', true); return; }
    guardandoProductos.add(id);
    try {
        const nombre = document.getElementById(`en-${id}`)?.value?.trim(); const precio = parseFloat(document.getElementById(`ep-${id}`)?.value); const precioMayor = parseFloat(document.getElementById(`epm-${id}`)?.value) || 0; const categoriaId = parseInt(document.getElementById(`cat-${id}`)?.value) || null; const subcategoria = document.getElementById(`subcat-${id}`)?.value || null; const descripcion = document.getElementById(`desc-${id}`)?.value?.trim() || '';
        if(!nombre){ mostrarToast('Nombre requerido', true); return; } if(!precio || precio <= 0){ mostrarToast('Precio > 0', true); return; }
        const variantes = []; const nombresVistos = new Set(); const filas = document.querySelectorAll(`#contenedor-filas-variantes-${id} .row-variante-accion`);
        filas.forEach(row => { const nom = row.querySelector('.v-input-nombre')?.value?.trim(); const stk = parseInt(row.querySelector('.v-input-stock')?.value) || 0; const fot = row.querySelector('.v-input-foto')?.value?.trim() || ''; if(nom && !nombresVistos.has(nom.toLowerCase())) { nombresVistos.add(nom.toLowerCase()); variantes.push({ nombre: nom, stock: stk, foto: fot }); } });
        if(!variantes.length){ mostrarToast('Al menos 1 variante', true); return; } const p = productos.find(x => x.id == id); if(!p) return;
        p.nombre = nombre; p.precio = precio; p.precioMayor = precioMayor; p.categoriaId = categoriaId; p.subcategoria = subcategoria; p.descripcion = descripcion; p.variantes = variantes;
        await safeFetch('/guardar-producto', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) });
        mostrarToast('✅ Guardado con variantes con éxito'); cargarYRenderAdmin();
    } finally {
        guardandoProductos.delete(id);
    }
}

function renderizarVentas(lista) {
    const stats = document.getElementById('ventas-stats');
    if (stats) {
        const totalVentas = lista.reduce((s,v)=>s+(v.total||0),0);
        const efectivo = lista.filter(v=>v.metodoPago==='efectivo').length;
        const transferencia = lista.filter(v=>v.metodoPago==='transferencia').length;
        const mayoristas = lista.filter(v=>v.esMayorista==1).length;
        stats.innerHTML = `
            <div class="stat-card" style="border-left:4px solid #C5A880"><i class="fas fa-receipt" style="color:#C5A880;font-size:26px;margin-bottom:8px"></i><h3>${lista.length}</h3><p style="color:#8C7E74;font-size:12px">Ventas totales</p></div>
            <div class="stat-card" style="border-left:4px solid #4E7A62"><i class="fas fa-dollar-sign" style="color:#4E7A62;font-size:26px;margin-bottom:8px"></i><h3>${fmt.format(totalVentas)}</h3><p style="color:#8C7E74;font-size:12px">Monto total</p></div>
            <div class="stat-card" style="border-left:4px solid #3D312A"><i class="fas fa-money-bill-wave" style="color:#3D312A;font-size:26px;margin-bottom:8px"></i><h3>${efectivo}</h3><p style="color:#8C7E74;font-size:12px">En efectivo</p></div>
            <div class="stat-card" style="border-left:4px solid #DE9B72"><i class="fas fa-exchange-alt" style="color:#DE9B72;font-size:26px;margin-bottom:8px"></i><h3>${transferencia}</h3><p style="color:#8C7E74;font-size:12px">Por transferencia</p></div>
            <div class="stat-card" style="border-left:4px solid #C5A880"><i class="fas fa-gem" style="color:#C5A880;font-size:26px;margin-bottom:8px"></i><h3>${mayoristas}</h3><p style="color:#8C7E74;font-size:12px">Mayoristas</p></div>

function filtrarVentas() {
    const busq = (document.getElementById('ventas-buscador')?.value||'').toLowerCase();
    if (!busq) { renderizarVentas(ventasHistorial); return; }
    const filtradas = ventasHistorial.filter(v => 
        (v.id||'').toLowerCase().includes(busq) ||
        (v.cliente?.nombre||'').toLowerCase().includes(busq) ||
        (v.cliente?.apellido||'').toLowerCase().includes(busq)
    );
    renderizarVentas(filtradas);
}

async function obtenerVentaPorId(id) {
    let v = ventasHistorial.find(x => x.id === id);
    if (!v) {
        const d = await safeFetch('/listar-ventas', {method:'POST'});
        ventasHistorial = d.lista || [];
        v = ventasHistorial.find(x => x.id === id);
    }
    return v;
}

async function obtenerConfigParaTicket() {
    const c = await safeFetch('/get-config', {method:'POST'});
    const deserializar = (campo) => {
        if (!campo) return {};
        if (typeof campo === 'object') return campo;
        try { return JSON.parse(campo); } catch(e) { return {}; }
    };
    return {
        logo: c.logo || '',
        empresa: deserializar(c.empresa),
        horarios: deserializar(c.horarios),
        redes: deserializar(c.redes)
    };
}

            safeFetch('/admin/costos/obtener-todos', { method: 'POST' })
        ]);
        productosRendimiento = d.lista || [];
        costosProductos = c.costos || {};
        renderizarRendimiento(productosRendimiento);
    } catch(e) {}
}

function toggleEditorCosto(pid) {
    const editor = document.getElementById(`editor-costo-${pid}`);
    if (!editor) return;
    const isOpen = editor.style.display !== 'none';
    editor.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) {
        const costo = costosProductos[pid];
        if (document.getElementById(`costo-base-${pid}`)) document.getElementById(`costo-base-${pid}`).value = costo?.costoBase || 0;
        if (document.getElementById(`costo-envio-${pid}`)) document.getElementById(`costo-envio-${pid}`).value = costo?.costoEnvio || 0;
        const container = document.getElementById(`gastos-adicionales-${pid}`);
        if (container) { container.innerHTML = ''; (costo?.gastosAdicionales||[]).forEach(g => { const div = document.createElement('div'); div.className='gasto-fila'; div.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px'; div.innerHTML=`<input type="text" class="gasto-nombre" value="${escapeHtml(g.nombre)}" placeholder="Nombre gasto..." style="flex:1;padding:7px 12px;border:1px solid #E6E1DA;border-radius:50px;font-size:12px"><input type="number" class="gasto-monto" value="${g.monto}" oninput="calcularCostoTotal('${pid}')" style="width:90px;padding:7px 10px;border:1px solid #E6E1DA;border-radius:50px;font-size:12px;text-align:right"><button onclick="this.closest('.gasto-fila').remove();calcularCostoTotal('${pid}')" style="background:none;border:none;color:#D96B6B;cursor:pointer;font-size:15px"><i class="fas fa-times-circle"></i></button>`; container.appendChild(div); }); }
        calcularCostoTotal(pid);
    }
}

function agregarFilaGasto(pid) {
    const container = document.getElementById(`gastos-adicionales-${pid}`);
    if (!container) return;
    const div = document.createElement('div'); div.className='gasto-fila'; div.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px';
    div.innerHTML=`<input type="text" class="gasto-nombre" placeholder="Ej: Bolsa, flete..." style="flex:1;padding:7px 12px;border:1px solid #E6E1DA;border-radius:50px;font-size:12px"><input type="number" class="gasto-monto" placeholder="0" oninput="calcularCostoTotal('${pid}')" style="width:90px;padding:7px 10px;border:1px solid #E6E1DA;border-radius:50px;font-size:12px;text-align:right"><button onclick="this.closest('.gasto-fila').remove();calcularCostoTotal('${pid}')" style="background:none;border:none;color:#D96B6B;cursor:pointer;font-size:15px"><i class="fas fa-times-circle"></i></button>`;
    container.appendChild(div);
}

function calcularCostoTotal(pid) {
    const base = parseFloat(document.getElementById(`costo-base-${pid}`)?.value)||0;
    const envio = parseFloat(document.getElementById(`costo-envio-${pid}`)?.value)||0;
    let gastos = 0;
    document.querySelectorAll(`#gastos-adicionales-${pid} .gasto-monto`).forEach(inp => { gastos += parseFloat(inp.value)||0; });
    const total = base + envio + gastos;
    const totalEl = document.getElementById(`costo-total-${pid}`);
    if (totalEl) totalEl.textContent = fmt.format(total);
    const p = productosRendimiento.find(x => x.id == pid);
    if (p) {
        const gmc = document.getElementById(`gan-menor-calc-${pid}`);
        const gmayc = document.getElementById(`gan-mayor-calc-${pid}`);
        if (gmc) { const g = p.precio-total; gmc.textContent=fmt.format(g); gmc.style.color=g>=0?'#4E7A62':'#D96B6B'; }
        if (gmayc && p.precioMayor>0) { const g = p.precioMayor-total; gmayc.textContent=fmt.format(g); gmayc.style.color=g>=0?'#4E7A62':'#D96B6B'; }
    }
}

async function guardarCostoProducto(pid) {
    const base = parseFloat(document.getElementById(`costo-base-${pid}`)?.value)||0;
    const envio = parseFloat(document.getElementById(`costo-envio-${pid}`)?.value)||0;
    const gastos = [];
    document.querySelectorAll(`#gastos-adicionales-${pid} .gasto-fila`).forEach(fila => { const nombre=fila.querySelector('.gasto-nombre')?.value?.trim(); const monto=parseFloat(fila.querySelector('.gasto-monto')?.value)||0; if(nombre) gastos.push({nombre,monto}); });
    try {
        const res = await safeFetch('/admin/costos/guardar', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({productoId:pid,costoBase:base,costoEnvio:envio,gastosAdicionales:gastos}) });
        if (res.success) { costosProductos[pid]={costoBase:base,costoEnvio:envio,gastosAdicionales:gastos,costoTotal:res.costoTotal}; mostrarToast(`✅ Costo guardado: ${fmt.format(res.costoTotal)}`); document.getElementById(`editor-costo-${pid}`).style.display='none'; renderizarRendimiento(productosRendimiento); }
    } catch(e) { mostrarToast('❌ Error al guardar costo', true); }
}

async function cargarHistorialGanancias() {
    const desde = document.getElementById('gan-desde')?.value;
    const hasta = document.getElementById('gan-hasta')?.value;
    const tbody = document.getElementById('historial-ganancias-body');
    if (tbody) tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:24px;color:#8C7E74"><i class="fas fa-spinner fa-spin" style="color:#C5A880;margin-right:8px"></i>Calculando ganancias...</td></tr>`;
    try {
        const d = await safeFetch('/admin/ganancias/historial', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({desde,hasta}) });
        const {historial=[],totalGanancia=0,totalVentas=0,cantidadVentas=0} = d;
        const summary = document.getElementById('historial-ganancias-summary');
        if (summary) summary.innerHTML=`
            <div class="stat-card" style="border-left:4px solid #C5A880"><i class="fas fa-shopping-bag" style="color:#C5A880;font-size:24px;margin-bottom:6px"></i><h3>${fmt.format(totalVentas)}</h3><p style="color:#8C7E74;font-size:12px">Total Ventas</p></div>
            <div class="stat-card" style="border-left:4px solid #4E7A62"><i class="fas fa-chart-line" style="color:#4E7A62;font-size:24px;margin-bottom:6px"></i><h3 style="color:#4E7A62">${fmt.format(totalGanancia)}</h3><p style="color:#8C7E74;font-size:12px">Ganancia Total</p></div>
            <div class="stat-card" style="border-left:4px solid #3D312A"><i class="fas fa-receipt" style="color:#3D312A;font-size:24px;margin-bottom:6px"></i><h3>${cantidadVentas}</h3><p style="color:#8C7E74;font-size:12px">Ventas</p></div>
            <div class="stat-card" style="border-left:4px solid #DE9B72"><i class="fas fa-percentage" style="color:#DE9B72;font-size:24px;margin-bottom:6px"></i><h3>${totalVentas>0?Math.round((totalGanancia/totalVentas)*100):0}%</h3><p style="color:#8C7E74;font-size:12px">Margen promedio</p></div>`;
        if (!historial.length) { if(tbody) tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:32px;color:#8C7E74">No hay ventas en el período seleccionado</td></tr>`; return; }
        if (tbody) tbody.innerHTML = historial.map(v => {
            const ganColor = v.gananciaVenta>=0?'#4E7A62':'#D96B6B';
            return `<tr style="border-bottom:1px solid #F6F3EA">
                <td style="padding:11px 14px;font-size:12px;color:#8C7E74">${v.fecha}</td>
                <td style="padding:11px 14px;font-size:12px;font-weight:600">${v.id}</td>
                <td style="padding:11px 14px;font-size:12px">${escapeHtml(v.cliente?.nombre||'Mostrador')}</td>
                <td style="padding:11px 14px;font-weight:700;text-align:right">${fmt.format(v.total)}</td>
                <td style="padding:11px 14px;font-weight:800;text-align:right;color:${ganColor}">${fmt.format(v.gananciaVenta)}</td>
                <td style="padding:11px 14px;text-align:center"><button onclick="toggleDetalleVenta('${v.id}')" style="background:#F6F3EA;border:none;border-radius:50px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;color:#3D312A"><i class="fas fa-eye"></i> Ver</button></td>
            </tr>
            <tr id="detalle-gan-${v.id}" style="display:none;background:#FDFBF7">
                <td colspan="6" style="padding:10px 20px">
                    ${v.items.map(it=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #F0EDE8;font-size:11px;gap:8px">
                        <span style="flex:1"><strong>${escapeHtml(it.pNom||'')}</strong> — ${escapeHtml(it.vNom||'')} x${it.cant}</span>
                        <span style="flex-shrink:0">Precio: <strong>${fmt.format(it.precio)}</strong> | Costo: <strong>${fmt.format(it.costoTotal)}</strong> | Gan: <strong style="color:${it.gananciaTotal>=0?'#4E7A62':'#D96B6B'}">${fmt.format(it.gananciaTotal)}</strong></span>
                    </div>`).join('')}
                </td>
            </tr>`;
        }).join('');
    } catch(e) { mostrarToast('Error al cargar historial', true); }
}

function toggleDetalleVenta(id) {
    const row = document.getElementById(`detalle-gan-${id}`);
    if (row) row.style.display = row.style.display==='none'?'table-row':'none';
}

function renderizarRendimiento(lista) {
    const totalProductos = lista.length;
    const totalVariantes = lista.reduce((s, p) => s + (p.variantes?.length||0), 0);
    const totalStock = lista.reduce((s, p) => s + (p.variantes?.reduce((vs, v) => vs + (v.stock||0), 0)||0), 0);
    const sinStock = lista.filter(p => p.variantes?.every(v => v.stock===0)).length;
    const stockBajo = lista.filter(p => p.variantes?.some(v => v.stock>0&&v.stock<=5) && !p.variantes?.every(v => v.stock===0)).length;
    const conCosto = lista.filter(p => costosProductos[p.id]).length;

    const badge = document.getElementById('rend-total-badge');
    if (badge) badge.innerHTML = `<i class="fas fa-box"></i> ${totalProductos} artículos`;

    const statsDiv = document.getElementById('rendimiento-stats');
    if (statsDiv) statsDiv.innerHTML = `
        <div class="stat-card" style="border-left:4px solid #C5A880"><i class="fas fa-boxes" style="color:#C5A880;font-size:26px;margin-bottom:8px"></i><h3>${totalProductos}</h3><p style="color:#8C7E74;font-size:12px">En catálogo</p></div>
        <div class="stat-card" style="border-left:4px solid #4E7A62"><i class="fas fa-warehouse" style="color:#4E7A62;font-size:26px;margin-bottom:8px"></i><h3>${totalStock}</h3><p style="color:#8C7E74;font-size:12px">Unidades stock</p></div>
        <div class="stat-card" style="border-left:4px solid #DE9B72"><i class="fas fa-exclamation-triangle" style="color:#DE9B72;font-size:26px;margin-bottom:8px"></i><h3>${stockBajo}</h3><p style="color:#8C7E74;font-size:12px">Stock bajo</p></div>
        <div class="stat-card" style="border-left:4px solid #D96B6B"><i class="fas fa-times-circle" style="color:#D96B6B;font-size:26px;margin-bottom:8px"></i><h3>${sinStock}</h3><p style="color:#8C7E74;font-size:12px">Sin stock</p></div>
        <div class="stat-card" style="border-left:4px solid #3D312A"><i class="fas fa-calculator" style="color:#3D312A;font-size:26px;margin-bottom:8px"></i><h3>${conCosto}</h3><p style="color:#8C7E74;font-size:12px">Con costo cargado</p></div>
    `;

    const grid = document.getElementById('rendimiento-grid');
    if (!grid) return;
    if (!lista.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:#8C7E74"><i class="fas fa-box-open" style="font-size:40px;margin-bottom:12px;display:block;opacity:0.4"></i>No se encontraron artículos</div>`;
        return;
    }

    grid.innerHTML = lista.map(p => {
        const stockTotal = p.variantes?.reduce((s, v) => s + (v.stock||0), 0) || 0;
        const fotoPreview = p.variantes?.[0]?.foto || '';
        const tieneMayor = p.precioMayor > 0;
        const costo = costosProductos[p.id];
        let estadoStock, colorEstado, iconoEstado;
        if (stockTotal===0) { estadoStock='Sin stock'; colorEstado='#D96B6B'; iconoEstado='fa-times-circle'; }
        else if (stockTotal<=5) { estadoStock='Stock bajo'; colorEstado='#DE9B72'; iconoEstado='fa-exclamation-triangle'; }
        else { estadoStock='Disponible'; colorEstado='#4E7A62'; iconoEstado='fa-check-circle'; }

        const variantesHTML = (p.variantes||[]).slice(0,4).map(v => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:${v.stock===0?'#FFF0F0':v.stock<=5?'#FFF8F0':'#F6F3EA'};border-radius:8px;font-size:11px">
                <span style="font-weight:600;color:#3D312A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${escapeHtml(v.nombre)}</span>
                <span style="font-weight:700;color:${v.stock===0?'#D96B6B':v.stock<=5?'#DE9B72':'#4E7A62'};flex-shrink:0;margin-left:6px">${v.stock} u.</span>
            </div>`).join('');
        const masV = (p.variantes?.length||0)>4 ? `<div style="text-align:center;font-size:10px;color:#8C7E74;margin-top:4px">+${p.variantes.length-4} más</div>` : '';

        const costoDisplay = costo ? `
            <div style="background:#F6F3EA;border-radius:12px;padding:10px 14px">

                    <h4 style="margin:0 0 5px;font-size:13px;font-weight:700;color:#3D312A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(p.nombre)}</h4>
                    <div style="display:flex;gap:5px;flex-wrap:wrap">
                        <span style="background:${colorEstado}20;color:${colorEstado};font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px"><i class="fas ${iconoEstado}"></i> ${estadoStock}</span>
                        <span style="background:#F6F3EA;color:#8C7E74;font-size:10px;font-weight:600;padding:2px 8px;border-radius:50px">${p.variantes?.length||0} variantes</span>
                        ${tieneMayor?`<span style="background:#E4EDE1;color:#4E7A62;font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px">MAYORISTA</span>`:''}

                    <div style="font-size:9px;font-weight:700;color:#C5A880;text-transform:uppercase;letter-spacing:0.5px">Stock Total</div>
                    <div style="font-size:18px;font-weight:800;color:${colorEstado}">${stockTotal} u.</div>
                </div>
            </div>

            <div style="padding:10px 16px;border-bottom:1px solid #F6F3EA;display:flex;flex-direction:column;gap:5px">
                <div style="font-size:9px;font-weight:700;color:#8C7E74;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Variantes</div>

                <button onclick="toggleEditorCosto('${p.id}')" style="width:100%;padding:11px;font-size:12px;border-radius:50px;background:${costo?'#E4EDE1':'#FFF8F0'};color:${costo?'#4E7A62':'#DE9B72'};border:2px solid ${costo?'#4E7A62':'#DE9B72'};font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">

async function cargarDatosRendProd(pid) {
    const desde = document.getElementById(`rp-desde-${pid}`)?.value || '';
    const hasta = document.getElementById(`rp-hasta-${pid}`)?.value || '';
    const statsDiv = document.getElementById(`rp-stats-${pid}`);
    const tablaDiv = document.getElementById(`rp-tabla-${pid}`);

    if (!desde && !hasta) {
        if (statsDiv) statsDiv.innerHTML = '';
        if (tablaDiv) tablaDiv.innerHTML = `<div style="text-align:center;padding:40px;color:#8C7E74;background:#F6F3EA;border-radius:16px"><i class="fas fa-calendar-alt" style="font-size:36px;display:block;margin-bottom:12px;opacity:0.4;color:#C5A880"></i><strong>Seleccioná un período</strong><br><span style="font-size:12px">Elegí fecha desde y hasta, luego presioná Filtrar</span></div>`;
        return;
    }

    if (tablaDiv) tablaDiv.innerHTML = `<div style="text-align:center;padding:24px;color:#8C7E74"><i class="fas fa-spinner fa-spin" style="color:#C5A880;margin-right:8px"></i>Calculando...</div>`;

    try {
        const d = await safeFetch('/admin/rendimiento-productos', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({desde,hasta}) });
        const prod = (d.rendimiento||[]).find(r => r.productoId == pid);

        if (!prod) {
            if (statsDiv) statsDiv.innerHTML = '';
            if (tablaDiv) tablaDiv.innerHTML = `<div style="text-align:center;padding:32px;color:#8C7E74"><i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.3"></i>Sin ventas en el período seleccionado</div>`;
            return;
        }

        const costo = costosProductos[pid];
        const costoTotal = costo ? parseFloat(costo.costoTotal) : 0;
        const prodData = productosRendimiento.find(p => p.id == pid);
        const precioMenor = prodData?.precio || 0;
        const precioMayor = prodData?.precioMayor || 0;
        const ganMenorUnit = precioMenor - costoTotal;
        const ganMayorUnit = precioMayor - costoTotal;
        const ganMenorTotal = ganMenorUnit * prod.ventasAdmin;
        const ganMayorTotal = ganMayorUnit * prod.ventasWeb;
        const ganTotal = ganMenorTotal + ganMayorTotal;

        if (statsDiv) statsDiv.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
                <div style="background:#F6F3EA;border-radius:16px;padding:16px;text-align:center">
                    <div style="font-size:10px;font-weight:700;color:#8C7E74;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px"><i class="fas fa-boxes" style="color:#C5A880"></i> Unidades vendidas</div>
                    <div style="font-size:28px;font-weight:800;color:#3D312A">${prod.unidades}</div>
                </div>
                <div style="background:#F6F3EA;border-radius:16px;padding:16px;text-align:center">
                    <div style="font-size:10px;font-weight:700;color:#8C7E74;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px"><i class="fas fa-dollar-sign" style="color:#4E7A62"></i> Ingresos totales</div>
                    <div style="font-size:22px;font-weight:800;color:#4E7A62">${fmt.format(prod.ingresos)}</div>
                </div>
                <div style="background:#F6F3EA;border-radius:16px;padding:16px;text-align:center">
                    <div style="font-size:10px;font-weight:700;color:#8C7E74;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px"><i class="fas fa-store" style="color:#3D312A"></i> Vendidas en local</div>
                    <div style="font-size:28px;font-weight:800;color:#3D312A">${prod.ventasAdmin}</div>
                </div>
                <div style="background:#F6F3EA;border-radius:16px;padding:16px;text-align:center">
                    <div style="font-size:10px;font-weight:700;color:#8C7E74;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px"><i class="fas fa-globe" style="color:#DE9B72"></i> Vendidas en web</div>
                    <div style="font-size:28px;font-weight:800;color:#DE9B72">${prod.ventasWeb}</div>
                </div>
            </div>

            ${costoTotal > 0 ? `
            <div style="background:linear-gradient(135deg,#3D312A,#52433A);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px">
                <div style="font-size:10px;font-weight:700;color:#C5A880;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px"><i class="fas fa-chart-line"></i> Ganancias del producto</div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,0.07);border-radius:12px">
                    <div>
                        <div style="font-size:11px;color:#C5A880;font-weight:700">Precio Menor — ${prod.ventasAdmin} u. × ${fmt.format(ganMenorUnit)}/u</div>
                        <div style="font-size:10px;color:#E6E1DA;opacity:0.6;margin-top:2px">Precio ${fmt.format(precioMenor)} − Costo ${fmt.format(costoTotal)}</div>
                    </div>
                    <div style="font-size:18px;font-weight:800;color:${ganMenorTotal>=0?'#4E7A62':'#D96B6B'}">${fmt.format(ganMenorTotal)}</div>
                </div>
                ${precioMayor > 0 ? `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,0.07);border-radius:12px">
                    <div>
                        <div style="font-size:11px;color:#C5A880;font-weight:700">Precio Mayor — ${prod.ventasWeb} u. × ${fmt.format(ganMayorUnit)}/u</div>
                        <div style="font-size:10px;color:#E6E1DA;opacity:0.6;margin-top:2px">Precio ${fmt.format(precioMayor)} − Costo ${fmt.format(costoTotal)}</div>
                    </div>
                    <div style="font-size:18px;font-weight:800;color:${ganMayorTotal>=0?'#4E7A62':'#D96B6B'}">${fmt.format(ganMayorTotal)}</div>
                </div>` : ''}
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(197,168,128,0.15);border-radius:12px;border:1px solid rgba(197,168,128,0.3)">
                    <div style="font-size:13px;font-weight:700;color:#C5A880">GANANCIA TOTAL</div>
                    <div style="font-size:22px;font-weight:800;color:${ganTotal>=0?'#C5A880':'#D96B6B'}">${fmt.format(ganTotal)}</div>
                </div>
            </div>` : `
            <div style="background:#FFF8F0;border:2px dashed #DE9B72;border-radius:16px;padding:20px;text-align:center">
                <i class="fas fa-exclamation-triangle" style="color:#DE9B72;font-size:24px;display:block;margin-bottom:8px"></i>
                <p style="color:#8C7E74;font-size:13px;margin:0">Sin costo cargado — no se puede calcular ganancia</p>
            </div>`}`;

        if (tablaDiv) tablaDiv.innerHTML = '';

    } catch(e) {
        if (statsDiv) statsDiv.innerHTML = '';
        if (tablaDiv) tablaDiv.innerHTML = `<div style="text-align:center;padding:24px;color:#D96B6B"><i class="fas fa-exclamation-circle"></i> Error al cargar datos</div>`;
    }

function filtrarRendimiento() {
    const busq = (document.getElementById('rendimiento-buscador')?.value||'').toLowerCase();
    const filtroStock = document.getElementById('rendimiento-filtro-stock')?.value||'todos';
    const orden = document.getElementById('rendimiento-orden')?.value||'nombre';
    let lista = [...productosRendimiento];
    if (busq) lista = lista.filter(p => p.nombre.toLowerCase().includes(busq));
    if (filtroStock==='con_stock') lista = lista.filter(p => p.variantes?.some(v=>v.stock>0));
    else if (filtroStock==='sin_stock') lista = lista.filter(p => p.variantes?.every(v=>v.stock===0));
    else if (filtroStock==='stock_bajo') lista = lista.filter(p => p.variantes?.some(v=>v.stock>0&&v.stock<=5));
    if (orden==='nombre') lista.sort((a,b)=>a.nombre.localeCompare(b.nombre));
    else if (orden==='precio_asc') lista.sort((a,b)=>a.precio-b.precio);
    else if (orden==='precio_desc') lista.sort((a,b)=>b.precio-a.precio);
    else if (orden==='stock_desc') lista.sort((a,b)=>b.variantes?.reduce((s,v)=>s+v.stock,0)-a.variantes?.reduce((s,v)=>s+v.stock,0));
    else if (orden==='stock_asc') lista.sort((a,b)=>a.variantes?.reduce((s,v)=>s+v.stock,0)-b.variantes?.reduce((s,v)=>s+v.stock,0));
    renderizarRendimiento(lista);
}

let _armadoPedidoData = null;

function iniciarArmadoPedido(id) {
    const p = pedidosTienda.find(x => x.id === id);
    if (!p) return;
    document.querySelectorAll('.modal').forEach(m => m.remove());
    _armadoPedidoData = { pedido: p, paso: 0 };
    _renderPasoArmado();
}

function _siguientePasoArmado() {
    if (!_armadoPedidoData) return;
    _armadoPedidoData.paso++;
    _renderPasoArmado();
}

async function marcarPedidoArmado(id) {
    try {
        await safeFetch('/tienda/marcar-armado', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pedidoId:id}) });
        mostrarToast('✅ Pedido marcado como armado');
        cargarPedidosTienda();
    } catch(e) {}
}

async function abonarPedido(id) {
    if (!confirm('¿Marcar este pedido como abonado?')) return;
    try {
        await safeFetch('/tienda/marcar-abonado', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pedidoId:id}) });
        mostrarToast('✅ Pedido marcado como abonado');
        await cargarPedidosTienda();
    } catch(e) { mostrarToast('❌ Error al abonar: ' + e.message, true); }
}

async function cancelarPedidoAdmin(id, requierePassword=false) {
    if (!confirm('¿Cancelar este pedido? Se restaurará el stock.')) return;
    if (requierePassword) {
        const pwd = prompt('Este pedido ya fue abonado. Ingresá tu contraseña de admin para confirmar la cancelación:');
        if (!pwd) return;
        try {
            const perfil = await safeFetch('/admin/perfiles', { method:'POST' });
            const adminPerfil = perfil?.lista?.find(p => p.usuario === adminActual?.usuario);
            const res = await safeFetch('/admin/verificar-password', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ password: pwd })
            });
            if (!res?.valida) { mostrarToast('❌ Contraseña incorrecta', true); return; }
        } catch(e) { mostrarToast('❌ Error al verificar contraseña', true); return; }
    }
    try {
        await safeFetch('/tienda/cancelar-pedido-admin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pedidoId:id}) });
        mostrarToast('✅ Pedido cancelado y stock restaurado');
        cargarPedidosTienda();
    } catch(e) {}
}
