<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Completar Datos | ESENCIA CURVY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#FDF8F4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{max-width:500px;width:100%}
        .card{background:white;border-radius:24px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
        h2{color:#8B5E3C;margin-bottom:8px;text-align:center}
        p{color:#7B6B5A;margin-bottom:24px;text-align:center;font-size:14px}
        .form-group{margin-bottom:16px}
        label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#3E2A1E}
        input,select{width:100%;padding:12px;border:2px solid #F0E6DC;border-radius:12px;font-size:14px}
        input:focus,select:focus{outline:none;border-color:#8B5E3C}
        input[readonly]{background:#F8F2EC;cursor:not-allowed;border-color:#E8DCD2}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .btn-submit{width:100%;padding:16px;background:#8B5E3C;color:white;border:none;border-radius:50px;font-weight:700;cursor:pointer;font-size:15px;margin-top:16px}
        .btn-submit:hover{background:#6B4423}
        .aviso{background:#FFF8E1;border:1px solid #FFB347;border-radius:12px;padding:12px;margin-bottom:20px;font-size:13px;color:#B45309}
        .toast{position:fixed;bottom:20px;right:20px;background:#4CAF50;color:white;padding:14px 20px;border-radius:40px;font-weight:600;z-index:1000;animation:slideIn 0.3s}
        .toast.error{background:#F44336}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🏪 Completá tus datos</h2>
            <div class="aviso">
                ⚠️ <strong>Tus datos son necesarios para envíos y retiros.</strong><br>
                Nombre, apellido, DNI y email no se podrán modificar después.
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="nombre" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Apellido *</label>
                    <input type="text" id="apellido" placeholder="Tu apellido">
                </div>
            </div>
            
            <div class="form-group">
                <label>Email * (no editable)</label>
                <input type="email" id="email" readonly>
            </div>
            
            <div class="form-group">
                <label>DNI * (no editable después)</label>
                <input type="text" id="dni" placeholder="Sin puntos" maxlength="8">
            </div>
            
            <div class="form-group">
                <label>Teléfono *</label>
                <input type="tel" id="telefono" placeholder="Para coordinar envíos">
            </div>
            
            <div class="form-group">
                <label>Provincia *</label>
                <select id="provincia">
                    <option value="">Seleccionar</option>
                    <option>Buenos Aires</option>
                    <option>CABA</option>
                    <option>Catamarca</option>
                    <option>Chaco</option>
                    <option>Chubut</option>
                    <option>Córdoba</option>
                    <option>Corrientes</option>
                    <option>Entre Ríos</option>
                    <option>Formosa</option>
                    <option>Jujuy</option>
                    <option>La Pampa</option>
                    <option>La Rioja</option>
                    <option>Mendoza</option>
                    <option>Misiones</option>
                    <option>Neuquén</option>
                    <option>Río Negro</option>
                    <option>Salta</option>
                    <option>San Juan</option>
                    <option>San Luis</option>
                    <option>Santa Cruz</option>
                    <option>Santa Fe</option>
                    <option>Santiago del Estero</option>
                    <option>Tierra del Fuego</option>
                    <option>Tucumán</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Localidad *</label>
                    <input type="text" id="localidad" placeholder="San Miguel">
                </div>
                <div class="form-group">
                    <label>CP *</label>
                    <input type="text" id="cp" placeholder="4000">
                </div>
            </div>
            
            <div class="form-group">
                <label>Dirección *</label>
                <input type="text" id="direccion" placeholder="Av. Independencia 1234">
            </div>
            
            <button class="btn-submit" onclick="completarDatos()">Guardar Datos</button>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const esGoogle = urlParams.get('google');
        
        if (esGoogle !== 'true' && !token) {
            window.location.href = '/login';
        }
        
        async function inicializarFormulario() {
            if (esGoogle === 'true') {
                console.log("✨ Modo Google: Email fijado, resto de datos limpios para carga manual.");
                // Forzamos campos de identificación vacíos
                if (document.getElementById('nombre')) document.getElementById('nombre').value = '';
                if (document.getElementById('apellido')) document.getElementById('apellido').value = '';
                
                // El correo electrónico es la única propiedad que se hereda de forma fija
                if (document.getElementById('email')) document.getElementById('email').value = urlParams.get('email') || '';
            } 
            else if (token) {
                try {
                    const res = await fetch('/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                    const data = await res.json();
                    if (data.email) {
                        document.getElementById('email').value = data.email;
                        localStorage.setItem('token', token);
                        localStorage.setItem('usuario', JSON.stringify(data));
                    }
                } catch(e) {
                    console.error("Error al cargar perfil tradicional:", e);
                }
            }
        }
        inicializarFormulario();
        
        async function completarDatos() {
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const email = document.getElementById('email').value.trim();
            const dni = document.getElementById('dni').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const direccion = document.getElementById('direccion').value.trim();
            const provincia = document.getElementById('provincia').value;
            const localidad = document.getElementById('localidad').value.trim();
            const cp = document.getElementById('cp').value.trim();
            
            if (!nombre || !apellido || !dni || !telefono || !direccion || !provincia || !localidad || !cp) {
                mostrarToast('Todos los campos son obligatorios', true);
                return;
            }
            
            const datosFormulario = { nombre, apellido, email, dni, telefono, direccion, provincia, localidad, cp };
            
            try {
                let res, data;
                
                if (esGoogle === 'true') {
                    datosFormulario.googleId = urlParams.get('googleId');
                    datosFormulario.foto = urlParams.get('foto');
                    
                    res = await fetch('/auth/crear-cuenta-google', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(datosFormulario)
                    });
                    
                    data = await res.json();
                    
                    if (data.success) {
                        mostrarToast('✅ Cuenta creada con éxito');
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('usuario', JSON.stringify(data.usuario));
                        setTimeout(() => window.location.href = '/tienda', 1500);
                    } else {
                        mostrarToast(data.error, true);
                    }
                } 
                else {
                    res = await fetch('/auth/completar-datos', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ nombre, apellido, dni, telefono, direccion, provincia, localidad, cp })
                    });
                    
                    data = await res.json();
                    
                    if (data.success) {
                        mostrarToast('✅ Datos guardados');
                        setTimeout(() => window.location.href = '/tienda', 1500);
                    } else {
                        mostrarToast(data.error, true);
                    }
                }
            } catch(e) {
                mostrarToast('Error de conexión con el servidor', true);
            }
        }
        
        function mostrarToast(msg, error) {
            const t = document.createElement('div');
            t.className = `toast ${error ? 'error' : ''}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
    </script>
</body>
</html>
