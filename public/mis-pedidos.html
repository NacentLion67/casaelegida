<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Compras | Casa Elegida</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#3D312A;--secondary:#C5A880;--bg:#FDFBF7;--border:#E6E1DA;--text-light:#8C7E74;--success:#4E7A62;--danger:#D96B6B}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh}
.header{background:white;padding:16px 20px;box-shadow:0 2px 12px rgba(61,49,42,0.04);display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.header a{color:var(--text-light);font-size:20px;text-decoration:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.header a:hover{background:var(--bg)}
.header h1{font-family:'Playfair Display',serif;font-size:20px;color:var(--primary)}
.container{max-width:820px;margin:24px auto;padding:0 16px;display:flex;flex-direction:column;gap:16px}
.pedido-card{background:white;border-radius:20px;border:1px solid var(--border);overflow:hidden}
.pedido-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border-bottom:1px solid #F6F3EA}
.pedido-id{font-weight:700;color:var(--primary);font-size:14px}
.pedido-fecha{font-size:12px;color:var(--text-light);margin-top:2px}
.badge{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase}
.b-pendiente{background:#FCF8E3;color:#8A6D3B}
.b-confirmado{background:#F6F3EA;color:#3D312A}
.b-abonado{background:#D9EDF7;color:#31708F}
.b-armado{background:#EAE0D5;color:#8C5E2A}
.b-enviado{background:#E6DCD2;color:#3D312A}
.b-entregado{background:#E4EDE1;color:#3C763D}
.b-cancelado{background:#F2DEDE;color:#A94442}
.pedido-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.pedido-total{font-weight:800;color:var(--primary);font-size:16px}
.aviso-comprobante{background:#FFF8E1;border:1px solid #FDE68A;border-radius:14px;padding:12px 16px;font-size:12px;color:#8A6D3B;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.aviso-enviado{background:#E4EDE1;border:1px solid #C8E0C8;border-radius:14px;padding:12px 16px;font-size:12px;color:#3C763D;display:flex;align-items:center;gap:10px}
.btn-mini{background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.empty{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty i{font-size:48px;opacity:0.3;display:block;margin-bottom:14px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,49,42,0.5);z-index:2000;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.modal-box{background:white;border-radius:24px;padding:24px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.modal-box h3{font-family:'Playfair Display',serif;color:var(--primary);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;font-size:18px}
.modal-box h3 button{background:none;border:none;font-size:20px;color:var(--text-light);cursor:pointer}
.drop-zone{border:2px dashed var(--border);border-radius:16px;padding:24px;text-align:center;cursor:pointer}
.drop-zone i{font-size:28px;color:var(--secondary);margin-bottom:8px;display:block}
.btn-confirm{width:100%;padding:14px;background:linear-gradient(135deg,#3D312A,#52433A);color:white;border:none;border-radius:50px;font-weight:700;font-size:13px;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-confirm:disabled{background:#CBD5E1;cursor:not-allowed}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:white;padding:12px 22px;border-radius:50px;font-weight:600;font-size:13px;z-index:3000}
.toast.error{background:var(--danger)}
.loader{text-align:center;padding:60px;color:var(--text-light)}
</style>
</head>
<body>
<div class="header">
    <a href="/tienda"><i class="fas fa-arrow-left"></i></a>
    <h1><i class="fas fa-receipt"></i> Mis Compras</h1>
</div>
<div class="container" id="lista-pedidos">
    <div class="loader"><i class="fas fa-spinner fa-spin" style="font-size:28px"></i></div>
</div>
<div id="toast-cont"></div>

<div class="modal" id="modal-comprobante">
    <div class="modal-box">
        <h3><span>Subir comprobante</span><button onclick="cerrarModalComprobante()">&times;</button></h3>
        <p style="font-size:12px;color:var(--text-light);margin-bottom:14px"><i class="fas fa-info-circle"></i> Subí una <strong>captura de pantalla (PNG)</strong> de la transferencia realizada.</p>
        <input type="file" id="mp-file" accept="image/png, image/jpeg" style="display:none" onchange="mpPreview(this)">
        <div class="drop-zone" onclick="document.getElementById('mp-file').click()" id="mp-dropzone">
            <i class="fas fa-cloud-upload-alt"></i>
            <span style="font-size:13px;color:var(--text-light)">Tocá para elegir la imagen</span>
        </div>
        <img id="mp-preview" style="display:none;max-width:100%;border-radius:12px;margin-top:12px">
        <button class="btn-confirm" id="mp-btn-confirmar" disabled onclick="mpConfirmar()"><i class="fas fa-check-circle"></i> Confirmar Pago</button>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login?return=/mis-pedidos';
const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });
let pedidos = [];
let pedidoActivoId = null;
let archivoSeleccionado = null;

function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function toast(msg, err=false){ const t=document.createElement('div'); t.className=`toast${err?' error':''}`; t.textContent=msg; document.getElementById('toast-cont').appendChild(t); setTimeout(()=>t.remove(),3500); }

const estadoLabel = { pendiente:'Pendiente', confirmado:'Confirmado', abonado:'Abonado', armado:'Armado', enviado:'Enviado', entregado:'Entregado', cancelado:'Cancelado' };

async function cargarPedidos() {
    try {
        const res = await fetch('/api/mis-pedidos', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        pedidos = data.lista || [];
        renderizar();
    } catch(e) {
        document.getElementById('lista-pedidos').innerHTML = `<div class="empty"><i class="fas fa-exclamation-circle"></i>Error al cargar tus compras</div>`;
    }
}

function renderizar() {
    const cont = document.getElementById('lista-pedidos');
    if (!pedidos.length) {
        cont.innerHTML = `<div class="empty"><i class="fas fa-shopping-bag"></i>Todavía no realizaste ninguna compra</div>`;
        return;
    }
    cont.innerHTML = pedidos.map(p => {
        const badgeClass = 'b-' + (p.estado||'pendiente');
        let aviso = '';
        if (p.estado === 'pendiente' && !p.comprobante) {
            aviso = `<div class="aviso-comprobante">
                <span><i class="fas fa-camera"></i> Falta subir el comprobante de pago</span>
                <button class="btn-mini" onclick="abrirModalComprobante('${p.id}')"><i class="fas fa-upload"></i> Subir Comprobante</button>
            </div>`;
        } else if (p.estado === 'pendiente' && p.comprobante) {
            aviso = `<div class="aviso-enviado"><i class="fas fa-clock"></i> Comprobante enviado — esperando confirmación del local</div>`;
        } else if (p.estado === 'cancelado') {
            aviso = `<div class="aviso-comprobante" style="background:#F2DEDE;border-color:#EBCCCC;color:#A94442"><i class="fas fa-times-circle"></i> Este pedido fue cancelado</div>`;
        }
        return `<div class="pedido-card">
            <div class="pedido-header">
                <div>
                    <div class="pedido-id">${escapeHtml(p.id)}</div>
                    <div class="pedido-fecha">${escapeHtml(p.fecha||'')}</div>
                </div>
                <span class="badge ${badgeClass}">${estadoLabel[p.estado]||p.estado}</span>
            </div>
            <div class="pedido-body">
                <div style="font-size:12px;color:var(--text-light)">${(p.items||[]).length} artículo(s) — ${p.tipoEntrega==='envio'?'Envío a domicilio':'Retiro en local'}</div>
                <div class="pedido-total">${fmt.format(p.total||0)}</div>
                ${aviso}
            </div>
        </div>`;
    }).join('');
}

function abrirModalComprobante(id) {
    pedidoActivoId = id;
    archivoSeleccionado = null;
    document.getElementById('mp-preview').style.display = 'none';
    document.getElementById('mp-btn-confirmar').disabled = true;
    document.getElementById('mp-btn-confirmar').innerHTML = '<i class="fas fa-check-circle"></i> Confirmar Pago';
    document.getElementById('modal-comprobante').classList.add('active');
}
function cerrarModalComprobante() { document.getElementById('modal-comprobante').classList.remove('active'); }

function mpPreview(input) {
    if (!input.files?.[0]) return;
    archivoSeleccionado = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
        const img = document.getElementById('mp-preview');
        img.src = e.target.result;
        img.style.display = 'block';
    };
    reader.readAsDataURL(archivoSeleccionado);
    document.getElementById('mp-btn-confirmar').disabled = false;
}

async function mpConfirmar() {
    if (!archivoSeleccionado || !pedidoActivoId) return;
    const btn = document.getElementById('mp-btn-confirmar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
    const f = new FormData();
    f.append('comprobante', archivoSeleccionado);
    f.append('pedidoId', pedidoActivoId);
    try {
        const res = await fetch('/tienda/subir-comprobante', { method:'POST', headers:{ 'Authorization': `Bearer ${token}` }, body:f });
        const data = await res.json();
        if (data.success) {
            toast('✅ Comprobante enviado con éxito');
            cerrarModalComprobante();
            cargarPedidos();
        } else {
            toast('❌ ' + (data.error||'Error al subir'), true);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmar Pago';
        }
    } catch(e) {
        toast('❌ Error de conexión', true);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmar Pago';
    }
}

document.addEventListener('DOMContentLoaded', cargarPedidos);
</script>
</body>
</html>
